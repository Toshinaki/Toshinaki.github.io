{\"type\":\"text\",\"text\":\"Inflow = Investment; Outflow = Debt.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Many people have no financial accumulation, not because they earn little, but because they mistake debt for investment—money is continuously flowing out, yet they think they are \\\"investing.\\\" Owner-occupied property is a typical example given in the book: monthly mortgage interest, taxes, maintenance fees... money is constantly flowing out, so for you, it's debt, not an investment. The bank saying \\\"buying a house is an investment\\\" is correct—for the bank, your monthly interest payments are its income.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"This leads to an important order principle: \"},{\"type\":\"text\",\"text\":\"Invest first, then incur debt (buy a house).\",\"bold\":true},{\"type\":\"text\",\"text\":\" If you buy a house first, you might never have spare money to invest; if you invest first, the returns from investing can help you buy a house more easily. Many families fail to accumulate wealth, not because of low income, but because the order is wrong.\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"Principle Three: Three Asset Types\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"There are only three main categories of financial investment:\"}]},{\"type\":\"ol\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Monetary assets\",\"bold\":true},{\"type\":\"text\",\"text\":\": Savings, bonds, money market funds, etc. High security, but inflation erodes returns. When interest rates don't beat inflation, you get poorer by saving.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Tangible assets\",\"bold\":true},{\"type\":\"text\",\"text\":\": Real estate, stocks, company shares, etc. Higher risk, requires more knowledge, but offers more generous long-term returns.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Gambling\",\"bold\":true},{\"type\":\"text\",\"text\":\": Pure entertainment, absolutely not to be confused with investment.\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The key is not which is better, but \"},{\"type\":\"text\",\"text\":\"how to allocate funds\",\"bold\":true},{\"type\":\"text\",\"text\":\"—this depends on goals, available capital, risk tolerance, and age.\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"Principle Four: Tangible Assets Outperform Monetary Assets Long-Term\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The reason is inflation:\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Monetary assets: Inflation devalues your money. If inflation is 4% and interest is 2%, you lose 2% annually in real terms. By the Rule of 72, at 4% inflation, your monetary purchasing power halves every 18 years.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Tangible assets: Inflation causes prices to rise, and tangible assets rise with them.\"}]}]}]},{\"type\":\"blockquote\",\"children\":[{\"type\":\"text\",\"text\":\"72 ÷ Inflation Rate = Years for Monetary Purchasing Power to Halve\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"This is also why, in the long run, putting all your money in a savings account is a decision that leads to chronic loss.\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"Principle Five: You Must Take Risks\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Financial freedom and absolute safety are two opposing paths that cannot be walked simultaneously.\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"People who seek safety prioritize \\\"not losing money,\\\" and their fear of loss outweighs their desire for profit. The result is: their money, while not \\\"lost,\\\" is slowly eroded by inflation and taxes, and after many years, the wealth they can command is far less than that of investors willing to take risks.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"People who seek freedom prioritize \\\"making money.\\\" This comes at a cost: courage, perseverance, being ready to make mistakes, and enduring occasional losses.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"An important point from the author: \"},{\"type\":\"text\",\"text\":\"True investors view losses as part of profits.\",\"bold\":true},{\"type\":\"text\",\"text\":\" No wealthy investor has not experienced losses; but he knows many poor people who have never lost money in investments—because they have never truly invested.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Trying to completely avoid risk will paradoxically lead to losing more—because inflation is silently taxing you, and you're doing nothing.\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"Principle Six: Diversification (Crucial)\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"No one can predict the future—whether it will be inflation or deflation, prosperity or recession. Therefore, \"},{\"type\":\"text\",\"text\":\"diversification is the only rational response\",\"bold\":true},{\"type\":\"text\",\"text\":\":\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Part of the funds invested in monetary assets, part in tangible assets.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Further diversification within monetary assets, and also within tangible assets.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Invest in globally operating funds, rather than betting on a single market.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"When funds are limited: half in money market funds, half diversified across several large stock funds.\"}]}]}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"Principle Seven: Investor vs. Ordinary Investor\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"This is a choice about \"},{\"type\":\"text\",\"text\":\"how much time you are willing to invest\",\"bold\":true},{\"type\":\"text\",\"text\":\", with no right or wrong answer.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Ordinary Investor\",\"bold\":true},{\"type\":\"text\",\"text\":\": Focuses on average returns, largely hands-off after asset allocation. Profits in bull markets, only waits in bear markets. The advantage is that it requires almost no time. Historical data shows that long-term holding of stock funds averages over 12% annually—this slow path is viable, but takes about 20 years.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Investor\",\"bold\":true},{\"type\":\"text\",\"text\":\": Not satisfied with average returns, actively takes action even in bear markets. Uses hedging tools (like options) to protect assets—when ordinary investors lose money, hedge funds might even profit. The cost is a lot of time and continuous learning, and making more mistakes, but viewing each mistake as part of success.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"Part Two: Five Important Decisions\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Principles are universal, but decisions are personal. The author proposes five questions that must be answered personally:\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Decision One: When to incur debt?\",\"bold\":true},{\"type\":\"text\",\"text\":\"\\nTo get rich quickly, you must only consider debt (like buying a house) after achieving financial safety. The wealthiest people don't even choose to incur debt before achieving financial freedom.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Decision Two: Invest or speculate, or both?\",\"bold\":true},{\"type\":\"text\",\"text\":\"\\nRegardless, you should invest a portion of your funds in stocks or stock funds (this is almost unavoidable). The real question is: do you also want to be an investor—i.e., hold assets that regularly generate cash flow? The investor path is faster (you can use assets as collateral for loans to expand), but requires more specialized knowledge.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Decision Three: Invest alone or with an advisor?\",\"bold\":true},{\"type\":\"text\",\"text\":\"\\nThe best way to find a good advisor: ask wealthy friends. Everyone should focus on what they are good at, and delegate other things to professionals.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Decision Four: How to allocate between monetary and tangible assets?\",\"bold\":true},{\"type\":\"text\",\"text\":\"\\nDepends on goals, available capital, risk tolerance, and age. There's a simple reference formula:\"}]},{\"type\":\"blockquote\",\"children\":[{\"type\":\"text\",\"text\":\"100 − Your Age = Maximum Recommended Share of Stocks and Stock Funds (%)\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The older you are, the more you should gradually reduce the proportion of high-risk tangible assets.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Decision Five: Which specific products to choose?\",\"bold\":true},{\"type\":\"text\",\"text\":\"\\nThis requires continuous learning: reading financial news, consulting advisors, attending seminars. The author does not give specific recommendations in the book (because the market is constantly changing), but emphasizes one point: good products need to be actively sought out, not waited for to come to you.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"The Final Choice Between Two Paths\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"This chapter concludes with a clear either/or:\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"The Slow Path\",\"bold\":true},{\"type\":\"text\",\"text\":\": Be an ordinary investor, pursue average returns, achieve financial freedom in about 20 years. Requires almost no extra time, but demands patience and discipline.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"The Fast Path\",\"bold\":true},{\"type\":\"text\",\"text\":\": Earn far more than average, or start a company, or become a true investor. Any of these requires a significant investment of time for continuous learning.\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"There's no right or wrong, only your own goals and reality.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"🤔 Personal Interpretation\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The most valuable takeaway from this chapter is the \\\"where money flows\\\" ruler—it's simple, cold, and practical. Use it to re-examine any asset allocation you're considering, and the answer will be much clearer than intuition.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Regarding owner-occupied property\",\"bold\":true},{\"type\":\"text\",\"text\":\": An owner-occupied home is a luxury, not an investment. It only counts as an investment if it's rented out and generates positive net rent; otherwise, it's debt.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Regarding the fast path vs. slow path\",\"bold\":true},{\"type\":\"text\",\"text\":\": My current chosen direction (side hustles → rapidly increasing income → accumulating principal) is essentially taking the fast path, and it's one of the three fast paths mentioned in the book—\\\"earning much more than others.\\\" The premise of this path is that income must go up first, so principal can accumulate quickly, and only then comes the stage of large-scale goose-laying. Before that, allocating existing principal according to the \\\"diversified + tangible assets first\\\" principle can be done simultaneously—no need to wait until income doubles to start.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Regarding risk\",\"bold\":true},{\"type\":\"text\",\"text\":\": The statement in Principle Five is worth pondering repeatedly: \\\"True investors view losses as part of profits.\\\" For someone who tends to be conservative and spends little, the challenge of this principle might not be in asset allocation, but in mindset—being willing to truly expose one's money to the market, even knowing it might sometimes shrink.\"}]},{\"type\":\"hr\",\"children\":[{\"type\":\"text\",\"text\":\"\"}]},{\"type\":\"h2\",\"children\":[{\"type\":\"text\",\"text\":\"Chapter 12 Financial Security, Financial Safety, and Financial Freedom\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"This chapter is the most practical and core chapter of the entire book. It breaks down the abstract goal of \\\"financial freedom\\\" into three concrete, quantifiable steps, and provides corresponding calculation methods and investment strategies for each step. After reading it, you should be able to answer \\\"how much money do I need\\\" with specific numbers.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"1. Three Steps: From Security to Freedom\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The author divides financial goals into three levels, which must be achieved in sequence, not skipped:\"}]},{\"type\":\"code_block\",\"value\":\"Financial Security → Financial Safety → Financial Freedom\",\"children\":[{\"type\":\"code_line\",\"children\":[{\"text\":\"Financial Security → Financial Safety → Financial Freedom\"}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"These are not three options, but three stages. The former is a prerequisite for the latter.\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"First Step: Financial Security\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Definition:\",\"bold\":true},{\"type\":\"text\",\"text\":\" How long you can maintain your lifestyle using savings even if your income suddenly stops (unemployment, illness, company bankruptcy).\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Calculation Method:\",\"bold\":true}]},{\"type\":\"blockquote\",\"children\":[{\"type\":\"text\",\"text\":\"Minimum monthly essential expenses × Number of months of security needed (usually 6-12 months) = Amount required for financial security\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"This is an \"},{\"type\":\"text\",\"text\":\"emergency reserve fund\",\"bold\":true},{\"type\":\"text\",\"text\":\", not an investment, not a goose account, but a buffer in the worst-case scenario.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Several key principles:\",\"bold\":true}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"This money must be kept in a \"},{\"type\":\"text\",\"text\":\"safe and readily accessible\",\"bold\":true},{\"type\":\"text\",\"text\":\" place (bank savings account or cash fund), and cannot be used for speculation.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"The smaller the target amount, the easier it is to achieve and maintain—so reducing monthly expenses is not just about saving money, but also a way to accelerate reaching the first step.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Before achieving financial security, you need to seriously \"},{\"type\":\"text\",\"text\":\"budget plan\",\"bold\":true},{\"type\":\"text\",\"text\":\" to understand where your money is going.\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Three most worthwhile items to optimize in your budget:\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Taxes, car, phone—the author believes these three are where most people have the most room for optimization in their expenses.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The significance of financial security is not just \\\"in case of emergency\\\":\",\"bold\":true}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"It gives you options in a crisis, so you don't have to compromise and accept bad jobs or decisions due to financial pressure.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"It is the foundation for building your entire wealth system—without this foundation, everything else is a castle in the air.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Economic downturns are often the best investment opportunities, and those without cash reserves can only watch them pass by.\"}]}]}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"Second Step: Financial Safety\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Definition:\",\"bold\":true},{\"type\":\"text\",\"text\":\" Accumulating enough principal so that the monthly interest alone can cover your basic living expenses, without touching the principal, theoretically no longer needing to work.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Calculation Formula (assuming 8% net annual return):\",\"bold\":true}]},{\"type\":\"blockquote\",\"children\":[{\"type\":\"text\",\"text\":\"Monthly amount needed × 150 = Total assets required for financial safety\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Example: If you need 2000 euros per month → you need 300,000 euros in principal.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The logic of this formula: 300,000 × 8% ÷ 12 ≈ 2000 euros/month, and the principal is never touched.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Investment Strategy (40:40:20 Principle):\",\"bold\":true}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"40%\",\"bold\":true},{\"type\":\"text\",\"text\":\" Low risk (time deposits, money market funds, bonds)\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"40%\",\"bold\":true},{\"type\":\"text\",\"text\":\" Medium risk (stable stock funds, long-term holding)\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"20%\",\"bold\":true},{\"type\":\"text\",\"text\":\" Higher risk (emerging market funds, special funds, etc.)\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Important principle: \"},{\"type\":\"text\",\"text\":\"The principal used for financial safety must absolutely not take on high risk.\",\"bold\":true},{\"type\":\"text\",\"text\":\" The analogy of three jugs—only when the first (financial security) is full can you fill the second (financial safety); only when the second is full can you fill the third (financial freedom).\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"Third Step: Financial Freedom\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Definition:\",\"bold\":true},{\"type\":\"text\",\"text\":\" The principal is large enough to not only cover basic expenses but also pay for all your dreams—house, travel, hobbies, donations—through interest, \"},{\"type\":\"text\",\"text\":\"without ever touching the principal\",\"bold\":true},{\"type\":\"text\",\"text\":\".\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Calculation Method:\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Step one: List all your dreams, estimate the total cost, and convert it into monthly payments (real estate over 120 months, other large items over 50 months).\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Step two: List your regular monthly expenses after achieving financial freedom (which can be higher than now).\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Step three:\"}]},{\"type\":\"blockquote\",\"children\":[{\"type\":\"text\",\"text\":\"(Monthly dream expenses + Monthly regular expenses) × 150 = Total assets required for financial freedom\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Investment Strategy (50:50 Principle):\",\"bold\":true},{\"type\":\"text\",\"text\":\"\\nFor the portion of funds used to achieve financial freedom (the amount exceeding what's needed for financial safety):\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"50%\",\"bold\":true},{\"type\":\"text\",\"text\":\" Medium risk\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"50%\",\"bold\":true},{\"type\":\"text\",\"text\":\" Higher risk\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Because even if all this money is lost, it won't affect your financial safety—your basic living is already secured by the second jug.\"}]},{\"type\":\"hr\",\"children\":[{\"type\":\"text\",\"text\":\"\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"2. The Three Jug Model (Core Framework)\"}]},{\"type\":\"code_block\",\"value\":\"[Jug 1: Financial Security] → After full → [Jug 2: Financial Safety] → Overflow → [Jug 3: Financial Freedom]\\nLow Risk                      40:40:20                        50:50 Medium-High Risk\",\"children\":[{\"type\":\"code_line\",\"children\":[{\"text\":\"[Jug 1: Financial Security] → After full → [Jug 2: Financial Safety] → Overflow → [Jug 3: Financial Freedom]\"}]},{\"type\":\"code_line\",\"children\":[{\"text\":\"Low Risk                      40:40:20                        50:50 Medium-High Risk\"}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Key rules:\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Jugs must be filled in order, no skipping.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Each jug corresponds to a different risk tolerance.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Once money is allocated to a jug for a specific purpose, it cannot be diverted—especially money for financial security and financial safety, which cannot be risked.\"}]}]}]},{\"type\":\"hr\",\"children\":[{\"type\":\"text\",\"text\":\"\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"3. About Goals and Decisions\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The latter half of this chapter spends a lot of time discussing \\\"why written goals are important,\\\" with the core argument being:\"}]},{\"type\":\"blockquote\",\"children\":[{\"type\":\"text\",\"text\":\"Setting clear goals for yourself and creating a written plan means you are already 50% successful.\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Four reasons:\"}]},{\"type\":\"ol\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Goals broaden opportunity awareness\",\"bold\":true},{\"type\":\"text\",\"text\":\"—with clear goals, you will start to find opportunities related to your goals in every person and every situation, instead of overlooking them.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Goals point to solutions\",\"bold\":true},{\"type\":\"text\",\"text\":\"—people with goals focus their energy on \\\"how to do it,\\\" not \\\"why it can't be done.\\\"\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Goals make you fight to win\",\"bold\":true},{\"type\":\"text\",\"text\":\"—\\\"not wanting to lose\\\" and \\\"wanting to win\\\" are two completely different psychological states; the former is passive defense, the latter is active offense.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Goals make every detail important\",\"bold\":true},{\"type\":\"text\",\"text\":\"—without goals, \\\"almost there\\\" doesn't matter; with goals, every small decision is related to the outcome.\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Regarding fear and making mistakes, there's a quote in the book worth remembering:\"}]},{\"type\":\"blockquote\",\"children\":[{\"type\":\"text\",\"text\":\"\\\"You shouldn't be someone who never makes mistakes, but someone who never gives up.\\\"\",\"bold\":true}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"4. About the Path to Becoming a Millionaire\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The book provides a breakdown of German millionaires by profession:\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"74% are entrepreneurs\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"10% are executives (board level)\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"10% are professionals (doctors, lawyers, architects)\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"5% are salespeople\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"1% are others\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The conclusion is straightforward: \"},{\"type\":\"text\",\"text\":\"If you are not an entrepreneur or an executive, the probability of becoming a millionaire is extremely low.\",\"bold\":true},{\"type\":\"text\",\"text\":\" Quoting J. Paul Getty: \\\"To accumulate real wealth, there is only one way—to build your own business.\\\"\"}]},{\"type\":\"hr\",\"children\":[{\"type\":\"text\",\"text\":\"\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"🤔 Personal Interpretation\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The most valuable takeaway from this chapter for me is the \"},{\"type\":\"text\",\"text\":\"three-step + three-jug framework\",\"bold\":true},{\"type\":\"text\",\"text\":\", which transforms a vague desire for \\\"financial freedom\\\" into three concrete plans that can be filled with specific numbers.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Applying my own numbers:\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Financial Security:\",\"italic\":true},{\"type\":\"text\",\"text\":\" Monthly expenses × 6-12 months = The amount that needs to be kept in a readily accessible, low-risk account. This money is not a goose account, not an investment, but a moat.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Financial Safety:\",\"italic\":true},{\"type\":\"text\",\"text\":\" Monthly expenses × 150 = Principal target. At the current rate of approximately 4 million JPY net increase per year, if existing principal is also allocated, this step can be reached within a few years—the exact speed depends on the investment return rate.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Financial Freedom:\",\"italic\":true},{\"type\":\"text\",\"text\":\" First, I need to clearly define \\\"how much my dream life would cost per month,\\\" then multiply by 150. This number varies greatly for each person, and clarifying this question itself holds significant value.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"One most important action:\",\"bold\":true},{\"type\":\"text\",\"text\":\" Calculate these three numbers now and write them down. Not just a rough estimate, but a serious listing and calculation of specific figures. This is the most worthwhile exercise in the entire book.\"}]},{\"type\":\"hr\",\"children\":[{\"type\":\"text\",\"text\":\"\"}]},{\"type\":\"h2\",\"children\":[{\"type\":\"text\",\"text\":\"Chapters 13, 14 The Environment for Success and Sowing Money\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"These two chapters conclude the book, differing entirely in nature from the preceding financial calculation chapters—they discuss \"},{\"type\":\"text\",\"text\":\"environment\",\"bold\":true},{\"type\":\"text\",\"text\":\" and \"},{\"type\":\"text\",\"text\":\"mindset\",\"bold\":true},{\"type\":\"text\",\"text\":\", not numbers. Chapter 13 explains how to create an external environment that forces success, and Chapter 14 discusses a seemingly counter-intuitive relationship between wealth and giving.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"1. Coaches and Expert Networks\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"Core Argument: Environment is More Reliable Than Willpower\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The author uses a physics analogy to illustrate the point: you stand on a table, trying to pull someone standing on the ground up, while they only need to \\\"stay still\\\" to pull you down—because pulling down is much easier than pulling up.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The meaning of this analogy is: \"},{\"type\":\"text\",\"text\":\"relying on willpower to fight against your surroundings is destined to fail in the long run.\",\"bold\":true},{\"type\":\"text\",\"text\":\" The truly effective approach is not to become \\\"stronger,\\\" but to change your environment—to let the environment itself become the force that propels you forward.\"}]},{\"type\":\"blockquote\",\"children\":[{\"type\":\"text\",\"text\":\"If you are surrounded by people poorer than you, you will stagnate. If you are surrounded by people richer than you, you will also become rich.\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"Three Types of People Form an Ideal Environment\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"1. Coach/Mentor\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"\\\"Coach\\\" here does not refer to a sports coach, nor specifically an investor, but rather \"},{\"type\":\"text\",\"text\":\"someone who has achieved far greater success than you in the field you aspire to, and is willing to guide your growth\",\"bold\":true},{\"type\":\"text\",\"text\":\"—this could be an entrepreneur, a successful person in a certain industry, or any master in a field you wish to learn.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The essence of this relationship is closer to a hybrid of \\\"mentor + partner\\\": the book suggests giving a portion of company equity to the coach, with the logic that \\\"50% of 10 million euros is far better than 100% of 50,000 euros.\\\" By giving up a portion of the profits, you gain the coach's genuine investment of time and resources—forming a true alignment of interests, rather than a one-sided guidance relationship.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"99% of outstanding successful people have coaches. Learning from a truly successful person for 6 months is better than fumbling on your own for 10 years.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The key to finding a mentor is not luck, but \"},{\"type\":\"text\",\"text\":\"what value you can offer the other person\",\"bold\":true},{\"type\":\"text\",\"text\":\"—a mentor won't spend time on you for no reason; you need to provide a reason for their investment. The author provides 17 tips for interacting with mentors, the core principles of which can be condensed into a few points:\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Understand why you need a mentor and what you can do for them.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Approach them with passion and specific goals, rather than vaguely \\\"seeking guidance.\\\"\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Respect the mentor's time; be fully prepared for every conversation.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Don't push problems onto the mentor to solve; instead, bring 3 alternative solutions and ask which one is best.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Accept tests—truly excellent mentors often test your endurance and determination first.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Repay the mentor through your success, not just verbal thanks.\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"2. Role Models\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Identify the best people in your field and study their mindset, work habits, values, and money views. This \\\"imitation of excellence\\\" is not about blindly copying behaviors, but about deeply observing and understanding the inner logic of successful people, gradually enabling yourself to think and perceive in the same way.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"3. Expert Network\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Actively meet one person each month who is more successful than you in a certain field, and maintain these relationships long-term. There is only one key mindset for building an expert network: \"},{\"type\":\"text\",\"text\":\"first think about what you can offer the other person, not what you can get from them.\",\"bold\":true}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"A Position That Needs Clarification\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The author says \\\"never be influenced by those less successful than you,\\\" which sounds extreme. He adds an explanation: helping others and learning from successful people are not contradictory, just as day and night together form a complete nature. The more successful you are in managing your own life, the wider your ability to help others—but when helping others, do not, in turn, follow their advice.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"2. Sowing Money\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"A Counter-Intuitive Phenomenon\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The author observes a pattern that cannot be fully explained by logic: \"},{\"type\":\"text\",\"text\":\"those who regularly donate 10% of their income often become richer than those who keep 100% of their income.\",\"bold\":true},{\"type\":\"text\",\"text\":\" How can 90% be more than 100%?\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"He doesn't claim this has scientific basis, but offers several possible explanations:\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Giving changes your relationship with money.\",\"bold\":true},{\"type\":\"text\",\"text\":\" When you are able to give, you are proving to yourself that you have more than you need. This \\\"sense of abundance\\\" influences how you treat money, making you less clingy, and instead more naturally attracting more money.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Giving proves money is a good thing.\",\"bold\":true},{\"type\":\"text\",\"text\":\" Many people have an implicit guilt about money, feeling that being rich is selfish. When you use money to do good, you confirm deep down that \\\"money is a tool that can be used for good\\\"—this belief itself can change how you accumulate and use money.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Giving brings vitality and a sense of meaning.\",\"bold\":true},{\"type\":\"text\",\"text\":\" People who only focus on themselves become lonely and depressed. Giving makes one feel connected to others, and this sense of fulfillment, in turn, boosts motivation.\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"Practical Application\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"It is recommended to consistently donate 1/10 of your income to others, and \"},{\"type\":\"text\",\"text\":\"not to wait until you \\\"have enough money\\\" to start.\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Historically, famous wealthy individuals—Carnegie, Rockefeller, Templeton—all began donating when they had almost nothing. The author believes that it was this expectation of abundance, rather than waiting for abundance to arrive before giving, that contributed to their later success.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"3. Knowledge is Power Only When Applied\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"There's a sentence in the book worth remembering as a summary of the entire work:\"}]},{\"type\":\"blockquote\",\"children\":[{\"type\":\"text\",\"text\":\"The adage \\\"knowledge is power\\\" is actually incorrect. The correct statement should be: knowledge is power only when applied.\",\"bold\":true}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"🤔 Personal Interpretation\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The most resonant part of Chapter 13 for me is the underlying logic that \\\"environment is more reliable than willpower.\\\" Fighting against an environment that drags you down with self-discipline is a battle destined to be exhausting. The smarter approach is to actively choose and build your environment—this is the same idea as \\\"actively choosing the people around you\\\" in Chapter 7, just explained more systematically in this chapter.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Chapter 14, taken alone, might seem a bit mystical, but when viewed in the context of the entire book's logic, it's actually talking about something very practical: your attitude towards money determines what you can do. A person who feels \\\"money is not enough\\\" and a person who feels \\\"I have enough money to give\\\" have completely different action patterns. Donating 10% is not just helping others, but also actively shaping your own money beliefs—and beliefs, as this book has emphasized from Chapter 1, are fundamental.\"}]}]},\"reading\":null}]}]\n"])</script><script>self.__next_f.push([1,"8:null\nc:[[\"$\",\"title\",\"0\",{\"children\":\"The Path to Financial Freedom | Re:Jeunesse\"}],[\"$\",\"link\",\"1\",{\"rel\":\"canonical\",\"href\":\"https://re-jeunesse.org/en/notes/the-path-to-financial-freedom/\"}],[\"$\",\"link\",\"2\",{\"rel\":\"alternate\",\"hrefLang\":\"zh\",\"href\":\"https://re-jeunesse.org/zh/notes/%E8%B4%A2%E5%8A%A1%E8%87%AA%E7%94%B1%E4%B9%8B%E8%B7%AF/\"}],[\"$\",\"link\",\"3\",{\"rel\":\"alternate\",\"hrefLang\":\"ja\",\"href\":\"https://re-jeunesse.org/ja/notes/%E7%B5%8C%E6%B8%88%E7%9A%84%E8%87%AA%E7%94%B1%E3%81%B8%E3%81%AE%E9%81%93/\"}],[\"$\",\"link\",\"4\",{\"rel\":\"alternate\",\"hrefLang\":\"en\",\"href\":\"https://re-jeunesse.org/en/notes/the-path-to-financial-freedom/\"}],[\"$\",\"meta\",\"5\",{\"property\":\"og:title\",\"content\":\"The Path to Financial Freedom\"}],[\"$\",\"meta\",\"6\",{\"name\":\"twitter:card\",\"content\":\"summary\"}],[\"$\",\"meta\",\"7\",{\"name\":\"twitter:title\",\"content\":\"The Path to Financial Freedom\"}]]\n"])</script></body></html>
