"type\":\"text\",\"text\":\"Three Types of People Form an Ideal Environment\"}]}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"a\",\"url\":\"#a-position-that-needs-clarification\",\"title\":null,\"children\":[{\"type\":\"text\",\"text\":\"A Position That Needs Clarification\"}]}]}]}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"a\",\"url\":\"#2-sowing-money\",\"title\":null,\"children\":[{\"type\":\"text\",\"text\":\"2. Sowing Money\"}]}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"a\",\"url\":\"#a-counter-intuitive-phenomenon\",\"title\":null,\"children\":[{\"type\":\"text\",\"text\":\"A Counter-Intuitive Phenomenon\"}]}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"a\",\"url\":\"#practical-application\",\"title\":null,\"children\":[{\"type\":\"text\",\"text\":\"Practical Application\"}]}]}]}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"a\",\"url\":\"#3-knowledge-is-power-only-when-applied\",\"title\":null,\"children\":[{\"type\":\"text\",\"text\":\"3. Knowledge is Power Only When Applied\"}]}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"a\",\"url\":\"#-personal-interpretation-6\",\"title\":null,\"children\":[{\"type\":\"text\",\"text\":\"🤔 Personal Interpretation\"}]}]}]}]}]}]},{\"type\":\"h2\",\"children\":[{\"type\":\"text\",\"text\":\"Chapter 1 What Do You Really Want?\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"1. Why Most People Don't Get Rich\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The author doesn't blame luck or background, but directly points out three structural reasons: governments encourage debt, the education system doesn't teach financial independence, and most parents aren't financial role models. These three combined create an environment where it's almost impossible to naturally learn how to get rich.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"But this isn't an excuse, it's context—it explains why you need to actively learn, rather than waiting for the environment to teach you.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"2. Optimism ≠ Confidence\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"This is the most important distinction to remember from Chapter 1:\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Optimism\",\"bold\":true},{\"type\":\"text\",\"text\":\": Makes you only see the positive side of things, a \\\"feel-good\\\" state.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Confidence\",\"bold\":true},{\"type\":\"text\",\"text\":\": Based on actual personal experience, knowing you can rely on yourself when things happen—a \\\"I've done it before\\\" assurance.\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Financial status is one of the most direct tools for building confidence\",\"bold\":true},{\"type\":\"text\",\"text\":\"—account balances expose all boasts, and give you a sense of security from reality when facing uncertainty, rather than blind optimism.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"3. The Four Pillars of Wealth: Dreams, Goals, Values, Strategies\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"To achieve a financial leap, the following four factors must be aligned:\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Dreams\",\"bold\":true},{\"type\":\"text\",\"text\":\": Imagine what you would do if you had unlimited time and money.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Goals\",\"bold\":true},{\"type\":\"text\",\"text\":\": Make clear decisions based on your dreams, determining who you want to be, what you want to do, and what you want to have.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Values\",\"bold\":true},{\"type\":\"text\",\"text\":\":\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Formation: Values are shaped by special experiences, parental teachings, and environment.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Values must align with goals (e.g., you cannot want to get rich while believing money is despicable).\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Realizing you have the freedom to choose your values and adjust them according to your goals allows you to control your life.\"}]}]}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Strategies\",\"bold\":true},{\"type\":\"text\",\"text\":\": Develop knowledge, abilities, and plans to assist success (e.g., saving, investing, increasing income).\"}]}]}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"4. The Five Areas of Life\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Life can be simplified into five equally important areas; the absence of any one area will affect the whole:\"}]},{\"type\":\"ol\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Health\",\"bold\":true},{\"type\":\"text\",\"text\":\": The capital for revolution.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Finances\",\"bold\":true},{\"type\":\"text\",\"text\":\": The peculiarity of the financial domain is that its problems most easily infiltrate other areas, shifting people's attention from life itself to anxiety about money. The goal of financial freedom is not \\\"to have a lot of money,\\\" but \"},{\"type\":\"text\",\"text\":\"to make finances no longer a shadow over your life\",\"bold\":true},{\"type\":\"text\",\"text\":\".\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Relationships\",\"bold\":true},{\"type\":\"text\",\"text\":\": Like \\\"salt to soup.\\\"\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Emotions\",\"bold\":true},{\"type\":\"text\",\"text\":\": People who cannot control their emotions cannot complete their plans.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Meaning of Life\",\"bold\":true},{\"type\":\"text\",\"text\":\": Do things that are interesting, align with your talents, and benefit others.\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"A principle worth remembering: \"},{\"type\":\"text\",\"text\":\"Build your career on your greatest passion.\",\"bold\":true},{\"type\":\"text\",\"text\":\" People who just work hard all day don't have time to truly make money.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"Personal Interpretation\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Values must align with goals.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Not because this principle is particularly new, but because it directly explains a very common, yet hard-to-detect, self-sabotage pattern—you can simultaneously \\\"want wealth\\\" and \\\"have negative associations with wealth subconsciously,\\\" and when these two coexist, the latter will quietly win.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Mindset creates the current situation, but cannot take you to where you want to be. \"},{\"type\":\"text\",\"text\":\"If you don't change your mindset, your future life will only be a repetition of the past.\",\"bold\":true}]},{\"type\":\"hr\",\"children\":[{\"type\":\"text\",\"text\":\"\"}]},{\"type\":\"h2\",\"children\":[{\"type\":\"text\",\"text\":\"Chapter 2 What Does Responsibility Mean?\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"1. The Essence of Responsibility: Response-Ability\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Responsibility is not about being accountable for what happened in the past, but about being accountable for \"},{\"type\":\"text\",\"text\":\"how you respond\",\"bold\":true},{\"type\":\"text\",\"text\":\" to those things.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"\\\"Orange\\\" Analogy\",\"bold\":true},{\"type\":\"text\",\"text\":\": No matter what pressure you apply to an orange, only orange juice comes out, because that's what's inside; similarly, a person's reaction under pressure reflects their inner nature, not the pressure itself.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"2. The Cost of Shifting Blame: Transfer of Power\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"When I shift responsibility to others (e.g., parents, government, boss), I also hand over the \"},{\"type\":\"text\",\"text\":\"power\",\"bold\":true},{\"type\":\"text\",\"text\":\" to change my destiny. Blaming others is psychologically comfortable, but the cost is becoming a spectator in your own life, rather than its master.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The book gives an example of twins: growing up in the same broken environment, one became a criminal, the other a successful lawyer. Same genes, parents, education, but their \"},{\"type\":\"text\",\"text\":\"response to the environment determined vastly different destinies\",\"bold\":true},{\"type\":\"text\",\"text\":\".\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"3. Expanding the \\\"Controllable Sphere\\\"\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The author divides life into two circles: the \"},{\"type\":\"text\",\"text\":\"controllable sphere\",\"bold\":true},{\"type\":\"text\",\"text\":\" (things I can directly influence) and the \"},{\"type\":\"text\",\"text\":\"personal domain\",\"bold\":true},{\"type\":\"text\",\"text\":\" (things that affect me but I cannot directly control).\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The process of getting rich is essentially a continuous expansion of the controllable sphere. Four methods:\"}]},{\"type\":\"ol\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Actively leave your comfort zone\",\"bold\":true},{\"type\":\"text\",\"text\":\"—the controllable sphere expands as you overcome challenges.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"View problems as opportunities for growth\",\"bold\":true},{\"type\":\"text\",\"text\":\"—problems often appear outside the controllable sphere. Don't just ask \\\"how to solve it,\\\" but ask \\\"how can I create a situation where this problem no longer appears.\\\"\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"The right way to ask questions\",\"bold\":true},{\"type\":\"text\",\"text\":\"—\\\"how to do\\\" seeks solutions, \\\"why\\\" seeks excuses. First, decide whether to do it (why), once decided, only ask how to do it, no longer doubt. Ask \"},{\"type\":\"text\",\"text\":\"\\\"what can I do\\\"\",\"bold\":true},{\"type\":\"text\",\"text\":\" instead of \\\"what can't I do,\\\" focusing energy on existing opportunities and strengths.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Expand your personal domain\",\"bold\":true},{\"type\":\"text\",\"text\":\"—develop interest and influence over more things, and your controllable sphere will grow synchronously.\"}]}]}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"🤔 Personal Interpretation\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Take responsibility for your actions, for your failures, for your successes, and similarly, for your financial situation.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"My current financial situation is mainly due to the decisions I've made over the past 10 years. If I don't value money and take responsibility for managing it, money will, in turn, control my life due to \\\"scarcity.\\\"\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The question isn't \\\"why is my financial situation like this,\\\" but \\\"what should I do to improve my financial situation.\\\" The former seeks excuses, the latter seeks paths. This is a habit that can be immediately applied to any decision.\"}]},{\"type\":\"hr\",\"children\":[{\"type\":\"text\",\"text\":\"\"}]},{\"type\":\"h2\",\"children\":[{\"type\":\"text\",\"text\":\"Chapter 3 Is 1 Million Euros an Unattainable Miracle?\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"This chapter clarifies that \\\"financial miracles\\\" are not accidental luck, but the inevitable result of applying \"},{\"type\":\"text\",\"text\":\"four growth laws\",\"bold\":true},{\"type\":\"text\",\"text\":\" and undergoing a deep transformation across \"},{\"type\":\"text\",\"text\":\"five cognitive dimensions\",\"bold\":true},{\"type\":\"text\",\"text\":\", ultimately evolving into a \"},{\"type\":\"text\",\"text\":\"\\\"person capable of bearing wealth.\\\"\",\"bold\":true}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"1. The Underlying Logic of Miracles: Five Levels of Cognitive Upgrade\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Profound change must happen simultaneously from the outside in. Merely superficial efforts (like working overtime) often only maintain the status quo; only changes that touch the underlying \\\"operating system\\\" can create miracles.\"}]},{\"type\":\"ol\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Action\",\"bold\":true},{\"type\":\"text\",\"text\":\"—realize dissatisfaction, start doing something\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Skills/Strategies\",\"bold\":true},{\"type\":\"text\",\"text\":\"—mere effort is not enough, need to find more agile solutions with a results-oriented approach\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Personal Development\",\"bold\":true},{\"type\":\"text\",\"text\":\"—examine what kind of person you want to become. By imitating role models, develop the personality capable of bearing success.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Worldview\",\"bold\":true},{\"type\":\"text\",\"text\":\"—change the \\\"colored glasses\\\" through which you view money and the world\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Self-Perception\",\"bold\":true},{\"type\":\"text\",\"text\":\"—the highest dimension of change. Change your fundamental self-positioning (\\\"employee working for a living\\\" → \\\"expert solving problems\\\")\"}]}]}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"2. Four Tools for Continuous Growth\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Reading\",\"bold\":true},{\"type\":\"text\",\"text\":\": At least 24-50 books a year, directly acquiring wisdom accumulated over others' lifetimes. A person is the sum of all the books they have read. Reading not only increases vocabulary but also directly acquires others' wisdom.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Success Journal\",\"bold\":true},{\"type\":\"text\",\"text\":\": The brain naturally remembers failures more easily. Record 5 specific successes or acknowledgments from others daily to actively train the brain's \\\"wealth consciousness.\\\" This is the most effective tool for building the \\\"confidence\\\" needed to bear wealth.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Lectures\",\"bold\":true},{\"type\":\"text\",\"text\":\": Compared to books, lectures offer multiple sensory stimuli (audio-visual), allow for \\\"lateral thinking\\\" away from daily chores, and facilitate networking with like-minded experts.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Role Models\",\"bold\":true},{\"type\":\"text\",\"text\":\": You become like those you associate with. Consciously choose people more successful than yourself as a reference.\"}]}]}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"3. The Formula for Good Luck\"}]},{\"type\":\"blockquote\",\"children\":[{\"type\":\"text\",\"text\":\"Good Luck = Stored Capital + Opportunity Recognition + Decisive Action\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"People tend to view things they don't understand as luck. In fact, good luck is not accidental; it can be actively \\\"cultivated.\\\" For someone who takes full responsibility for their success, good luck is part of their plan; someone who attributes success to luck loses the ability to \\\"repeat success.\\\"\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"4. The Price of Miracles: Courage and Risk\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"No miracle comes without risk. If you don't feel scared before taking a new step, it means that step isn't big enough for you.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Bamboo Analogy\",\"bold\":true},{\"type\":\"text\",\"text\":\": Bamboo sleeps in the soil for 4 years, requiring daily watering and weeding, and only in the 5th year does it shoot up 20 meters in 90 days. Profound changes accumulate their roots internally when they are not visible externally. \"},{\"type\":\"text\",\"text\":\"Don't give up because you don't see short-term results.\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"You shouldn't measure yourself against others, but against \\\"your past self.\\\" Overcoming fear to try something trivial to others is also a great personal adventure.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"🤔 Personal Interpretation\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"More important than becoming a millionaire is becoming a \\\"\"},{\"type\":\"text\",\"text\":\"miracle-creating\",\"bold\":true},{\"type\":\"text\",\"text\":\" millionaire.\\\"\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Self-discipline and new habits always begin with \"},{\"type\":\"text\",\"text\":\"new beliefs\",\"bold\":true},{\"type\":\"text\",\"text\":\". If beliefs don't change, my actions and results will forever repeat the past.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Don't overspend in the short term; persevere in the long term.\",\"bold\":true}]},{\"type\":\"hr\",\"children\":[{\"type\":\"text\",\"text\":\"\"}]},{\"type\":\"h2\",\"children\":[{\"type\":\"text\",\"text\":\"Chapter 4 Why Aren't More People Getting Rich?\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"This chapter analyzes the essence of obstacles to wealth: the principles of getting rich are often simple and public, yet most people subconsciously choose and adhere to the psychological inertia that keeps them mediocre.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"1. No Clear Definition of Wealth\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The brain doesn't respond to abstract desires, only to concrete images. \\\"I want to get rich\\\" is not a goal; \"},{\"type\":\"text\",\"text\":\"a clear number + deadline + visualized image\",\"bold\":true},{\"type\":\"text\",\"text\":\" is a goal.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The author suggests creating a \"},{\"type\":\"text\",\"text\":\"\\\"dream album\\\"\",\"bold\":true},{\"type\":\"text\",\"text\":\"—materializing your ideal life into images, allowing your subconscious to be continuously stimulated by the goal, and it will automatically start looking for ways to achieve it.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"2. Wavering Goals\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Big goals are easier to stick to than small goals.\",\"bold\":true},{\"type\":\"text\",\"text\":\" This sounds counter-intuitive, but the logic is: the smaller the goal, the more an obstacle will completely block your view; if the goal is big enough, an obstacle is just a small stone on the road. The subconscious likes stable, continuous movement, so once a long-term goal is set, change it as little as possible. The grander the goal, the fewer adjustments needed.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"At the same time, grand goals can enhance \"},{\"type\":\"text\",\"text\":\"the perception of opportunities\",\"bold\":true},{\"type\":\"text\",\"text\":\". Even if there are twists and turns in the middle, because the destination is huge enough, I can still maintain my direction.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"3. Not Treating Wealth as a Necessity\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Ordinary people \\\"want\\\" wealth, successful people \\\"need\\\" wealth—the driving forces are completely different.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"\\\"There's a wallet at the bottom of a cliff\\\" and \\\"There's a crying child at the bottom of a cliff,\\\" your actions will be completely different—because saving a person is a non-negotiable necessity, while picking up a wallet is not. \"},{\"type\":\"text\",\"text\":\"Transforming financial goals into an inner \\\"absolute necessity\\\" allows you to not back down when encountering obstacles.\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Creating pressure leverage\",\"bold\":true},{\"type\":\"text\",\"text\":\": Through dream albums and public commitments, link goals with \\\"great pleasure\\\" and \\\"extreme pain if not achieved.\\\" \"},{\"type\":\"text\",\"text\":\"When I have no retreat, success is the only way.\",\"bold\":true}]},{\"type\":\"blockquote\",\"children\":[{\"type\":\"text\",\"text\":\"💡 \"},{\"type\":\"text\",\"text\":\"Wealth is there; if I don't take it, someone else will. Instead of letting mediocre people enjoy it, let me control wealth. Only I can use this wealth reasonably to create true value.\",\"italic\":true}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"4. Inability to Persevere\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The root of mediocrity's failure lies in setting \\\"limits\\\" and \\\"escape routes\\\" for themselves, while winners, at the moment of setting a goal, eliminate the option of \\\"giving up\\\" from their mindset.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"True successful people, when setting goals, do not include \\\"what if I fail\\\" options in their plans. \"},{\"type\":\"text\",\"text\":\"If obstacles are allowed to exist, they become excuses for retreating\",\"bold\":true},{\"type\":\"text\",\"text\":\"; if not allowed, obstacles are merely steps towards success.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Goal authenticity verification:\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Method\",\"bold\":true},{\"type\":\"text\",\"text\":\": Close your eyes and vividly rehearse a typical daily life after achieving the goal.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Standard\",\"bold\":true},{\"type\":\"text\",\"text\":\": If, while imagining these details and potential difficulties, you can persist for 10 minutes and still feel immense joy and satisfaction, this \\\"endogenous motivation\\\" will become the fuel for long-term persistence and never giving up.\"}]}]}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"5. Not Taking Responsibility for One's Own Success\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Mediocre people push financial responsibility onto experts (like doctors, lawyers, tax advisors, or bosses), seeing themselves as victims of circumstances. Experts can only offer advice, but \"},{\"type\":\"text\",\"text\":\"I am the sole boss in control of the overall situation\",\"bold\":true},{\"type\":\"text\",\"text\":\".\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Many people can accept \\\"failure is my fault,\\\" but tend to believe \\\"success is luck or external forces.\\\"\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"This perception is dangerous—because if success is accidental, I lose the ability to repeat success. \"},{\"type\":\"text\",\"text\":\"Only by firmly believing that success is created by myself can I replicate it at any time.\",\"bold\":true},{\"type\":\"text\",\"text\":\" Believe that you are the creator of success, not a lucky finder. Only by taking responsibility for success can you truly enhance your self-worth and be confident that you can control future financial gains.\"}]},{\"type\":\"blockquote\",\"children\":[{\"type\":\"text\",\"text\":\"💡 \"},{\"type\":\"text\",\"text\":\"Success didn't make me; I made success.\",\"italic\":true}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"6. Unwillingness to Give 110% Effort\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Growth happens in the \"},{\"type\":\"text\",\"text\":\"\\\"11th lift.\\\"\",\"bold\":true},{\"type\":\"text\",\"text\":\" Most people are satisfied with 80% effort and use it as an excuse, but only by putting in that extra 10% can they receive double or even a hundredfold reward.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"7. Lack of a Good Coach\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"A coach can objectively evaluate progress, apply necessary pressure, and use their experience to help you avoid detours.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"8. Focusing Only on Weaknesses\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"No one gets rich by eliminating weaknesses. \"},{\"type\":\"text\",\"text\":\"It's my strengths that make me rich.\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The correct approach is: find solutions for weaknesses (e.g., hire professionals), and focus all energy on strengthening strengths.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"🤔 Personal Interpretation\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"I should:\"}]},{\"type\":\"ol\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Clearly define wealth goals\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Set a grand goal and never change it\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Value wealth, treating it as a necessity in life\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Persevere\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Take responsibility for my own success\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Work hard\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Learn from role models\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Address weaknesses, focus on strengthening strengths\"}]}]}]},{\"type\":\"hr\",\"children\":[{\"type\":\"text\",\"text\":\"\"}]},{\"type\":\"h2\",\"children\":[{\"type\":\"text\",\"text\":\"Chapter 5 What Are Your True Thoughts About Money?\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"This chapter reveals the ultimate truth of wealth accumulation: \"},{\"type\":\"text\",\"text\":\"my financial situation today is an accurate reflection of my own beliefs\",\"bold\":true},{\"type\":\"text\",\"text\":\". To achieve extraordinary wealth, one must bridge the gap between \\\"wanting\\\" and \\\"believing,\\\" transforming one's money mindset from an \\\"impediment\\\" to evolution into an \\\"engine\\\" for miracles.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"1. Wanting ≠ Believing\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Life is like a mail-order store; it only ships what you truly order (deeply believe in) from within.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Deep-seated bias\",\"bold\":true},{\"type\":\"text\",\"text\":\": You might verbally \\\"want\\\" a lot of money, but if subconsciously you \\\"believe\\\" money corrupts human nature, your subconscious will ensure you \\\"stay pure\\\" by overspending or giving up saving.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The criterion for judging a thought is not \\\"right or wrong,\\\" but whether it helps achieve the goal. Any \\\"correct view\\\" that hinders a goal is a shackles that must be removed.\"}]},{\"type\":\"blockquote\",\"children\":[{\"type\":\"text\",\"text\":\"💡 \"},{\"type\":\"text\",\"text\":\"Once a goal is set, the only criterion for judging all thoughts and actions is: does it help achieve the goal?\",\"italic\":true}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"2. The Table Model of Belief\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The author uses an analogy to explain the formation of beliefs:\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Thoughts are tabletops\",\"bold\":true},{\"type\":\"text\",\"text\":\": A thought is just a floating board without support.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Experiences are table legs\",\"bold\":true},{\"type\":\"text\",\"text\":\": When you find enough \\\"evidence\\\" for this thought, it becomes a stable \\\"belief,\\\" almost unshakable.\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The way to change beliefs is not by repeating slogans, but by: \"},{\"type\":\"text\",\"text\":\"breaking old table legs\",\"bold\":true},{\"type\":\"text\",\"text\":\" (questioning whether old experiences are true) + \"},{\"type\":\"text\",\"text\":\"finding new table legs for new ideas\",\"bold\":true},{\"type\":\"text\",\"text\":\" (using others' successful experiences as supporting evidence).\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"3. Three Underlying Beliefs\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Any effective change must simultaneously satisfy:\"}]},{\"type\":\"ol\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Necessity\",\"bold\":true},{\"type\":\"text\",\"text\":\": My situation \"},{\"type\":\"text\",\"text\":\"must\",\"bold\":true},{\"type\":\"text\",\"text\":\" change.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Autonomy\",\"bold\":true},{\"type\":\"text\",\"text\":\": \"},{\"type\":\"text\",\"text\":\"I\",\"bold\":true},{\"type\":\"text\",\"text\":\" must change it.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Possibility\",\"bold\":true},{\"type\":\"text\",\"text\":\": I \"},{\"type\":\"text\",\"text\":\"can\",\"bold\":true},{\"type\":\"text\",\"text\":\" change it.\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"All three are indispensable. Only \\\"must\\\" without \\\"can\\\" leads to despair; \"},{\"type\":\"text\",\"text\":\"only \\\"can\\\" without \\\"must\\\" leads to procrastination\",\"bold\":true},{\"type\":\"text\",\"text\":\".\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"4. The Lever of Success: 90% \\\"Why\\\", 10% \\\"How\\\"\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Most people focus their energy on researching \\\"how to do it,\\\" but what truly determines success or failure is \\\"why it must be done.\\\" Once a goal is imbued with a strong enough motivation—achieving it brings immense joy, not achieving it brings immense pain—the \\\"how to do it\\\" path will automatically appear.\"}]},{\"type\":\"hr\",\"children\":[{\"type\":\"text\",\"text\":\"\"}]},{\"type\":\"h2\",\"children\":[{\"type\":\"text\",\"text\":\"Chapter 6 Debt\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"This chapter elucidates the psychological essence of debt: \"},{\"type\":\"text\",\"text\":\"consumer debt is not a financial problem, but a psychological one\",\"bold\":true},{\"type\":\"text\",\"text\":\". The author emphasizes that the best way to overcome debt is not merely \\\"paying it back,\\\" but by building wealth consciousness simultaneously with debt repayment through a \\\"50/50\\\" defense system.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"1. The Nature of Debt: A Foolish \\\"Painkiller\\\"\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Debt is divided into \\\"wise debt\\\" (e.g., business financing) and \\\"foolish debt\\\" (consumer debt). \"},{\"type\":\"text\",\"text\":\"Consumer debt has no advantages\",\"bold\":true},{\"type\":\"text\",\"text\":\"; it's a temporary pleasure exchanged for escaping immediate pain (the disappointment of not being able to afford something).\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Psychological cause\",\"bold\":true},{\"type\":\"text\",\"text\":\": Being in debt is not involuntary; it's the brain's \\\"avoid pain, seek pleasure\\\" program at work.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The prerequisite for changing your financial situation is to \"},{\"type\":\"text\",\"text\":\"change your beliefs\",\"bold\":true},{\"type\":\"text\",\"text\":\". The book asks readers to answer a core question: \\\"Why do I deserve to have a lot of money?\\\" It also uses a set of counter-intuitive self-diagnostic questions to uncover the beliefs hidden behind debt: What are the downsides for me of getting out of debt? (If there were no downsides, you wouldn't be in debt. Possible downsides include: giving up freedom, financial tightness, damaged image, decreased quality of life...) and so on.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"2. Core Defense Mechanism: The 50/50 Principle (Logical Restructuring)\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"This is the most subversive financial rule in this chapter: \"},{\"type\":\"text\",\"text\":\"apart from daily living expenses, use 50% of the surplus to pay off debt, and the remaining 50% is strictly deposited into a \\\"goose account.\\\"\",\"bold\":true}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Wealth consciousness \\\"firewall\\\"\",\"bold\":true},{\"type\":\"text\",\"text\":\": If you use all your money to pay off debt, your account will still be at zero the day you pay it off. This feeling of \\\"having nothing\\\" will completely destroy motivation.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Mindset shift\",\"bold\":true},{\"type\":\"text\",\"text\":\": The 50/50 principle allows you to see wealth accumulating while paying off debt. Subconsciously, you are no longer \\\"a failed person paying off debt,\\\" but \\\"a controller who is getting rich.\\\"\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Extended cognition: \"},{\"type\":\"text\",\"text\":\"\\\"Not spending money\\\" and \\\"saving money\\\" are two different things.\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Behind the 50/50 principle is an easily overlooked cognitive distinction:\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"\\\"Not spending money\\\" is passive—you just haven't spent the money, it stays in the account, but you haven't actively assigned it a purpose.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"\\\"Saving money\\\" is active—you consciously separate a definite amount of money from your income and put it into a dedicated place, giving it a clear purpose.\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The difference lies in intent and identity. A person who doesn't spend is just \\\"someone who spends less\\\"; a person who saves is \\\"someone who is accumulating wealth.\\\" The former's result is that there happens to be a balance in the account; the latter's result is that you are executing a financial plan. The best way to turn \\\"natural surplus\\\" into \\\"conscious saving\\\" is to physically separate savings and daily expenses into different accounts.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"3. Retention of Power: The Psychological Tactic of Cash Reserves\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Meaning of reserve funds\",\"bold\":true},{\"type\":\"text\",\"text\":\": No matter how heavy the debt, a non-negotiable cash reserve (e.g., 25,000 euros) must be kept in a safe.\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"80% of the pressure on heavily indebted individuals does not come from the total debt, but from having no money to cover tomorrow's expenses. Cash reserves can free up 80% of your energy, allowing you to focus on the most important thing: \"},{\"type\":\"text\",\"text\":\"creating income\",\"bold\":true},{\"type\":\"text\",\"text\":\".\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"Core Principles of Reserve Funds\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Amount: Enough to cover about 6 months of basic living expenses.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Retention method: Deposited into an account completely separate from daily consumption. Not linked to any payments, treated as non-existent in daily life.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"\\\"Treat it as non-existent\\\": This money is deposited and then untouched, neither entering nor leaving. Its purpose is not to grow in value, but to provide a buffer for you to restart and calmly think of solutions in the worst-case scenario.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Do not use even in bankruptcy: The book emphasizes that this reserve fund should only be used in case of bankruptcy or legal declaration. Before that, it must be treated as if it doesn't exist.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Psychological value: Wealthy people who face bankruptcy and lose everything can still maintain their standard of living because they always keep an undisclosed reserve fund. Reserve funds maintain confidence, and confidence maintains the ability to act.\"}]}]}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"4. Redefining Freedom: From Self-Discipline to Self-Esteem\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"New meaning of freedom\",\"bold\":true},{\"type\":\"text\",\"text\":\": Freedom is not doing whatever you want, but \"},{\"type\":\"text\",\"text\":\"\\\"disciplined execution of what I have planned.\\\"\",\"bold\":true}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Rejecting sympathy\",\"bold\":true},{\"type\":\"text\",\"text\":\": Never show your doubts or seek sympathy from others. Sympathy will trap you in a victim mentality. Winners should earn respect, and respect comes from taking 100% responsibility for your debts, blaming no one.\"}]}]}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"5. Bankruptcy: When There's No Other Choice\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"If bankruptcy is inevitable, \\\"11:55\\\" is better than \\\"12:00.\\\" The \"},{\"type\":\"text\",\"text\":\"earlier\",\"bold\":true},{\"type\":\"text\",\"text\":\" you make the decision, the more resources you retain and the more room you have to restart.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Bankruptcy decisions must be made in consultation with an experienced bankruptcy attorney. Sometimes, continuing to struggle costs more than starting over—\\\"pushing an old car out of deep mud can be much harder than buying a new one.\\\"\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Bankruptcy may mean giving up a business into which you've poured a lot of time, energy, and money. This requires distinguishing between optimism and reality—if something has been slowly getting worse for a long time, it won't suddenly get better without change.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"6. Practical Guide to Eliminating Debt\"}]},{\"type\":\"ol\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Belief Liquidation\",\"bold\":true},{\"type\":\"text\",\"text\":\": Identify old beliefs that led to your debt (e.g., \\\"I deserve this luxury item\\\") and break them.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Physical Isolation\",\"bold\":true},{\"type\":\"text\",\"text\":\": Cut up all credit cards, severing the source of consumer debt.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Goal Replacement\",\"bold\":true},{\"type\":\"text\",\"text\":\": Don't fight not to lose (pay off debt), fight to win (get rich). Set your goals higher and further, and debt will just be a small obstacle on the way to the top.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Step Back\",\"bold\":true},{\"type\":\"text\",\"text\":\": Don't take debt problems too seriously. Debt is a \\\"toxic situation\\\"; you need to extract the medicine called \\\"growth\\\" from it.\"}]}]}]},{\"type\":\"hr\",\"children\":[{\"type\":\"text\",\"text\":\"\"}]},{\"type\":\"h2\",\"children\":[{\"type\":\"text\",\"text\":\"Chapter 7 How to Increase Your Income\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"1. A Fundamental Premise: Your Income is What You Deserve\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"All content in this chapter is built on an uncomfortable premise: \"},{\"type\":\"text\",\"text\":\"your current income precisely equals the value you currently create in the market.\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"This means: you cannot say \\\"I am undervalued\\\"—if you were truly worth that much, you would have already received it. Complaining about the environment, your boss, or timing is just \"},{\"type\":\"text\",\"text\":\"handing over decision-making power to others\",\"bold\":true},{\"type\":\"text\",\"text\":\". The author's stance is quite firm: as long as you allow others to decide your income, you also hand over the power to control your own life.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Accepting this premise is the starting point for all action advice in this chapter.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"2. What Constitutes Income? A Formula\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The author breaks down \\\"income\\\" into five independently trainable components and provides a calculation formula:\"}]},{\"type\":\"blockquote\",\"children\":[{\"type\":\"text\",\"text\":\"Income = (Ability × Energy × Influence × Self-Esteem × Creativity) ÷ 2\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Among these, Ability, Energy, Self-Esteem, and Creativity are each scored out of 10, while \"},{\"type\":\"text\",\"text\":\"Influence is scored out of 100\",\"bold\":true},{\"type\":\"text\",\"text\":\"—it has 10 times the weight of all other components.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"For example, if you scored 5, 10, 3, 6, 6 respectively for the five items, your monthly income would be approximately 2700 euros. But if you simply increased Influence from 3 to 30, your monthly income would become 27000 euros—everything else remaining unchanged.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The most important insight from this formula is: hard work (Ability, Energy) is a necessary condition, but by no means a decisive factor. The real leverage lies in how many people know you.\",\"bold\":true},{\"type\":\"text\",\"text\":\" This explains why two people with similar abilities can have incomes that differ by 10 times—some tennis stars can earn big money, not just because they play tennis well, but because thousands of people are watching them play.\"}]},{\"type\":\"blockquote\",\"children\":[{\"type\":\"text\",\"text\":\"💡 \"},{\"type\":\"text\",\"text\":\"This formula's applicability extends far beyond the workplace. Investing improves the \\\"Ability\\\" component, but its ceiling is obvious when capital is limited; side hustles/personal projects are the true path to leveraging the 100-point \\\"Influence\\\" variable—two developers with similar abilities, whose incomes differ by 10 times, the gap is almost always here.\",\"italic\":true}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"3. How to Improve These Five Areas\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"Influence (Most Important)\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Doing what everyone else can do makes your value like a grain of sand in the desert. You cannot stand out by being \\\"better,\\\" because there are plenty of people who think they are better than others. \"},{\"type\":\"text\",\"text\":\"The key is not to be better, but to be more unique.\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"This means you need to make yourself an \"},{\"type\":\"text\",\"text\":\"expert\",\"bold\":true},{\"type\":\"text\",\"text\":\" in a specific niche. The core advantage of an expert is: clients actively seek you out, rather than you seeking clients. Once you become an expert, you can limit your target audience to a \\\"small group,\\\" thereby setting higher prices.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The path to becoming an expert is more concrete than most people imagine:\"}]},{\"type\":\"ol\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Identify your passion and talent, and determine which field you can dominate in 3 years.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"All decisions revolve around this goal, not around existing clients.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"There's an acceleration method: \"},{\"type\":\"text\",\"text\":\"Write a full-page advertisement positioning yourself as an expert today (even if it's just a draft).\",\"bold\":true},{\"type\":\"text\",\"text\":\" This exercise will force you to examine your value from a client's perspective and immediately reveal what you are still lacking.\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Additionally, increasing influence also includes: publishing articles, public speaking, PR exposure, hosting events, building alliances with people in other fields for cross-promotion... In short, doing everything possible to make more people know your name.\"}]},{\"type\":\"blockquote\",\"children\":[{\"type\":\"text\",\"text\":\"💡 \"},{\"type\":\"text\",\"text\":\"\\\"Expert positioning\\\" is purer in the context of side hustles than in the workplace: you don't need to convince a boss, but directly build recognition in the market. Technical blogs, open-source projects, consistently contributing in specific communities—these are all low-cost, accumulative ways to build influence.\",\"italic\":true}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"Ability, Energy, and Creativity: Basic Conditions, Not Determinants\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The growth of ability has a clear compounding effect. Someone who spends two hours a day reading professional books can earn 2-3 times more in 10 years than someone who watches two hours of TV a day—not because they work harder, but because their decisions have \"},{\"type\":\"text\",\"text\":\"continuously accumulated\",\"bold\":true},{\"type\":\"text\",\"text\":\" over 10 years.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The fastest way to grow ability is not by reading, but by \"},{\"type\":\"text\",\"text\":\"actively choosing the people around you\",\"bold\":true},{\"type\":\"text\",\"text\":\". If you are surrounded by people more successful than you, you naturally become better; if you are surrounded by unmotivated people, you will stagnate. The author's habit is to meet at least one new friend each month who is more successful than him in a certain field.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The logic for energy and creativity is similar: both can be \"},{\"type\":\"text\",\"text\":\"actively cultivated\",\"bold\":true},{\"type\":\"text\",\"text\":\", not inherently fixed. In terms of energy—\"},{\"type\":\"text\",\"text\":\"a healthy lifestyle\",\"bold\":true},{\"type\":\"text\",\"text\":\" unlocks more energy, and the more energy you expend, the more energy you paradoxically have; in terms of creativity, the advice is to always have a notebook or recorder ready to immediately jot down ideas that emerge while driving, walking, or half-asleep, because as long as you continuously record and input, creativity will keep flowing—and just one good idea could be worth millions.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The commonality of these three components is: they are \"},{\"type\":\"text\",\"text\":\"multipliers\",\"bold\":true},{\"type\":\"text\",\"text\":\" in the income formula, not the main characters. Doing them well is a necessary condition, but amplifying any one of them alone has a clear ceiling. The real leverage always lies in influence.\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"Self-Esteem: Dare to Ask for Returns\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Most people can imagine an income ceiling that is twice their current income. Larger growth feels \\\"impossible\\\" psychologically—this is where the ceiling of self-esteem comes into play.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Self-esteem also directly determines whether you dare to ask for returns. For equally valuable services, experts charge high fees, while people with insufficient self-esteem might not charge anything—\"},{\"type\":\"text\",\"text\":\"not because they lack ability, but because they don't realize their service is valuable.\",\"bold\":true},{\"type\":\"text\",\"text\":\" Earning money is a reflection of taking responsibility for your quality of life; as long as you create value, asking for returns is a matter of course.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"4. The Right Way to Work: Attitude Before Skill\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"While improving the above areas, the author also dedicates much space to discussing daily work attitude. These principles may sound like old clichés, but the author's argumentation is noteworthy—he argues from a purely self-serving perspective, not a moral one.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"On giving more than expected:\",\"bold\":true},{\"type\":\"text\",\"text\":\" If you are paid for 8 hours, you should work 10 hours. This is not to please your employer, but because you are accumulating the most important thing for yourself—\"},{\"type\":\"text\",\"text\":\"work habits that will lead you to success\",\"bold\":true},{\"type\":\"text\",\"text\":\". Habits are two-way; the time saved by slacking off at work will eventually erode you in another way.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"On acting immediately:\",\"bold\":true},{\"type\":\"text\",\"text\":\" Rapid execution is the ultimate secret to success. People who do things quickly and frequently will indeed make more mistakes, but the benefits far outweigh the losses. \"},{\"type\":\"text\",\"text\":\"Those who are not afraid of making mistakes pursue excellence; those who are afraid of making mistakes pursue perfection and achieve nothing.\",\"bold\":true},{\"type\":\"text\",\"text\":\" If 51% of quick decisions are right, that's enough to get rich.\"}]},{\"type\":\"blockquote\",\"children\":[{\"type\":\"text\",\"text\":\"💡 \"},{\"type\":\"text\",\"text\":\"This point is more critical in the context of side hustles/personal projects than in the workplace. In the workplace, \\\"waiting until you're ready to act\\\" might just slow down promotion, but in side hustles, this mindset can keep projects forever in the draft stage. Delaying launch, pricing, or letting people know—this is the most common cause of death for side hustles, not lack of ability.\",\"italic\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"On obligations and rights:\",\"bold\":true},{\"type\":\"text\",\"text\":\" Thinking only about \\\"what the company should give me\\\" versus thinking only about \\\"what I can do for the company\\\" leads to vastly different results—the former stagnates, the latter grows. This is not moralizing, but a simple cause-and-effect logic.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"On delegation:\",\"bold\":true},{\"type\":\"text\",\"text\":\" You need to do two things simultaneously: take on more responsibility (become indispensable), while making yourself \\\"non-essential\\\" for daily execution (delegate everything others can do). These two are not contradictory—the former happens at the \"},{\"type\":\"text\",\"text\":\"planning and decision-making level\",\"bold\":true},{\"type\":\"text\",\"text\":\", the latter at the \"},{\"type\":\"text\",\"text\":\"execution level\",\"bold\":true},{\"type\":\"text\",\"text\":\". People who only execute eventually become slaves to the company; people who dare to delegate have the energy to do higher-value work.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"5. Special Traps for Self-Employed Individuals\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"This section is essentially about \"},{\"type\":\"text\",\"text\":\"using systems to protect yourself from human errors.\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"A typical case for self-employed individuals: income fluctuates, they splurge during peak seasons and borrow during off-seasons, ending up in debt after a few years, yet never understanding where the money went. The solution is very simple: \"},{\"type\":\"text\",\"text\":\"pay yourself a fixed \\\"salary\\\" each month based on the minimum expected income, strictly separate personal and business accounts, and the remaining money belongs to the company.\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Another common trap is investing all money back into the company, completely betting personal wealth on the future sale price of the company. The correct approach is: regularly withdraw money from the company to accumulate personal wealth; if the company truly needs a large amount of capital, it should use O.P.M. (Other People's Money, i.e., loans)—\"},{\"type\":\"text\",\"text\":\"consumer debt should be strictly avoided, but business expansion can use leverage\",\"bold\":true},{\"type\":\"text\",\"text\":\", because effective business investments will increase turnover, and inflation will reduce the real value of loans.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"6. A Cognitive Boundary\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"An important conceptual distinction: \"},{\"type\":\"text\",\"text\":\"high income ≠ wealth\",\"bold\":true},{\"type\":\"text\",\"text\":\".\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Standard of living automatically inflates to your income level. No matter how much you earn, \\\"necessary expenses\\\" will always fill the account.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"True wealth has only one definition: \"},{\"type\":\"text\",\"text\":\"being able to live off the interest of your assets without needing to work.\",\"bold\":true},{\"type\":\"text\",\"text\":\" Achieving this goal is not about how much you earn, but how much you save—do you want to own a money-making machine, or forever be a money-making machine?\"}]},{\"type\":\"blockquote\",\"children\":[{\"type\":\"text\",\"text\":\"💡 \"},{\"type\":\"text\",\"text\":\"This is also why simply increasing income is not enough: if living expenses inflate with income, net worth won't truly grow. Increasing income and controlling the savings rate must be pursued simultaneously.\",\"italic\":true}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"🤔 Personal Interpretation: What This Chapter Means for My Current Situation\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"This chapter dedicates a lot of space to \\\"how to create more value and negotiate raises in the workplace,\\\" which has limited appeal for those who no longer rely on salary increases to accumulate wealth. However, if we strip the framework of this chapter from the \\\"workplace\\\" context and look at it independently, it remains highly relevant—because its underlying logic is not \\\"how to get your employer to pay you more,\\\" but \"},{\"type\":\"text\",\"text\":\"\\\"where does income come from, and how to amplify it.\\\"\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The income formula is the most valuable takeaway.\",\"bold\":true},{\"type\":\"text\",\"text\":\" Apply it to areas beyond salary:\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"The \"},{\"type\":\"text\",\"text\":\"investment\",\"bold\":true},{\"type\":\"text\",\"text\":\" path is essentially about improving the \\\"ability\\\" component (financial judgment, ability to select targets). This is necessary, but it's one of the smallest multipliers in the formula. A more critical constraint is that the \\\"influence\\\" of investment is equivalent to the size of the principal—when the principal is small, even with high returns, the absolute profit is limited. This is not a reason to give up investing, but rather to say: before capital accumulates to a certain scale, relying solely on investment returns to \\\"get rich\\\" is very slow. The book places increasing income before saving/investing, and the logic is here.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"The \"},{\"type\":\"text\",\"text\":\"side hustle\",\"bold\":true},{\"type\":\"text\",\"text\":\" path is where the formula truly has explosive potential. Side hustles based on existing professional skills (development, technology) are among the few ways that can directly leverage the 100-point \\\"influence\\\" component. If a personal project gains users, if technical content builds a readership, if a certain reputation is established in a community—these all add to influence, and an increase in influence can amplify the value of all other efforts tenfold. This is why two developers with similar skill levels can have vastly different incomes.\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"So, the most useful question from this chapter for the present moment is: \"},{\"type\":\"text\",\"text\":\"Which component am I investing my time in right now? What is the ceiling for that component?\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Diligently doing your main job essentially adds small points to \\\"energy\\\" and \\\"ability,\\\" with a clear ceiling. But spending time on personal projects, side hustles, and building influence is leveraging the highest-weighted lever—even if the start is slow, the direction is right.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Furthermore, the book's sections on \\\"acting immediately\\\" and \\\"don't strive for perfection, strive for excellence\\\" are more useful in the context of side hustles/personal projects than in the workplace: the biggest enemy of side hustles is often not a lack of ability, but a reluctance to launch, price, or let people know.\"}]},{\"type\":\"hr\",\"children\":[{\"type\":\"text\",\"text\":\"\"}]},{\"type\":\"h2\",\"children\":[{\"type\":\"text\",\"text\":\"Chapters 8, 9, 10 Savings, Compound Interest, and the Start of Investing\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"These three chapters form a coherent whole, discussing three levels of the same thing: \"},{\"type\":\"text\",\"text\":\"first, keeping your money (saving), then understanding how it grows (compound interest), and finally, knowing what it takes to truly make it appreciate.\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"For those who already have a habit of saving, Chapter 8 can be read quickly. Chapters 9 and 10 contain some independent content worth noting separately.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"1. The Goose Analogy: The Essence of Financial Freedom\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"These three chapters use the same imagery throughout: \"},{\"type\":\"text\",\"text\":\"Goose = principal, Golden Egg = interest (passive income).\",\"bold\":true},{\"type\":\"text\",\"text\":\" The farmer killed the goose looking for gold, only to find nothing—most people's financial state is similar: spending all income, the principal never grows, and there are never any golden eggs.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Financial freedom has only one definition: \"},{\"type\":\"text\",\"text\":\"the principal is large enough that its interest alone can cover living expenses.\",\"bold\":true},{\"type\":\"text\",\"text\":\" Before this, you work for money; after this, money works for you. The entire logic of saving and investing is preparing for this day.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"2. Savings: How to Keep Your Money\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Core Operation: Pay Yourself 10% at the Beginning of the Month\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"On payday, immediately transfer 10% of your net income to a separate \\\"goose account\\\"; the remaining 90% is your usable income. Don't save what's left at the end of the month—this is where most savings plans fail.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"When You Get a Raise: Add 50% of the Raise to Your Goose Account\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Since you haven't adapted to the higher standard of living after the raise, this 50% will barely be felt. This mechanism automatically increases your savings rate with your income, without needing to \\\"make a decision\\\" each time.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Strict Boundaries of the Goose Account:\",\"bold\":true}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Life insurance, pension insurance are not included in the 10%—those are other types of fixed expenses.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Money saved for short-term goals like travel or a new car is also not included—that's consumption savings.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Money in the goose account can only be invested for growth, never for consumption of the principal.\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"A counter-intuitive conclusion worth remembering: \"},{\"type\":\"text\",\"text\":\"the lower the income, the easier it is to implement the savings percentage.\",\"bold\":true},{\"type\":\"text\",\"text\":\" Saving 10% of 1000 euros is 100 euros; saving 10% of 10000 euros is 1000 euros—the absolute amount is larger, and the psychological resistance is greater. \\\"I'll save when my income is higher\\\" is a self-fulfilling procrastination.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"3. Compound Interest: The Multiplier Effect of Time\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Only three variables affect the result of compound interest: \"},{\"type\":\"text\",\"text\":\"time, profit rate, and principal.\",\"bold\":true},{\"type\":\"text\",\"text\":\" But the relationship between these three is multiplication, not addition—a small change in any one variable will lead to an order-of-magnitude difference.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The impact of profit rate far exceeds intuition:\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"With the same 1000 euro investment, after 30 years:\"}]},{\"type\":\"table\",\"children\":[{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Annual Return Rate\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Final Amount\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"7%\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Approx. 7,600 euros\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"12%\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Approx. 30,000 euros\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"20%\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Approx. 237,000 euros\"}]}]}]}],\"props\":{\"align\":[]}},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Increasing the profit rate by 3 times does not result in 3 times the amount, but nearly 30 times.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"A Quick Mental Math Tool: The Rule of 72\",\"bold\":true}]},{\"type\":\"blockquote\",\"children\":[{\"type\":\"text\",\"text\":\"72 ÷ Annual Interest Rate = Years to Double Principal\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"12% annual return: 72 ÷ 12 = \"},{\"type\":\"text\",\"text\":\"6 years to double\",\"bold\":true}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"5% annual return: 72 ÷ 5 = \"},{\"type\":\"text\",\"text\":\"14 years to double\",\"bold\":true}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"5% and 12% sound like a small difference, but the result after 30 years differs by about 4 times. This is why pursuing higher investment returns is worth spending time learning—even improving by a few percentage points has a huge long-term compounding effect.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The role of time is equally irreplaceable:\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Starting at age 30, saving 200 euros per month (12% annual return), by age 65 you would have approximately \"},{\"type\":\"text\",\"text\":\"1.05 million euros\",\"bold\":true},{\"type\":\"text\",\"text\":\". If you start at age 45, to achieve the same result, you would need to save \"},{\"type\":\"text\",\"text\":\"1200 euros\",\"bold\":true},{\"type\":\"text\",\"text\":\" per month—15 years later, requiring 6 times the monthly contribution.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"4. Making Compound Interest a Muscle Memory\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"In addition to the mathematical principles of compound interest, Chapter 9 also proposes a specific behavioral exercise: \"},{\"type\":\"text\",\"text\":\"start by saving 5 euro cents in the first month, double it each month, and persist for 18 months.\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"5 euro cents → 10 euro cents → 20 euro cents... by the 16th month, you would need to save approximately 1600 euros, and by the 18th month, the cumulative total would exceed 13000 euros.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The practical significance of this exercise is not in the small interest, but in two things: first, it psychologically forces you to \"},{\"type\":\"text\",\"text\":\"find new sources of income\",\"bold\":true},{\"type\":\"text\",\"text\":\" in the first 14 months to cover the increasing deposit amount; second, it makes \\\"opening up income channels\\\" a habit, rather than a one-time decision. The author says it's \\\"exercising your income ability like exercising a muscle.\\\"\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Furthermore, Chapter 9 also points out the underlying logic of capitalism: the word capitalism itself contains \\\"capital.\\\" If you don't make capital and investment work for you, the entire capitalist system will quietly pass you by—economically, you are living in the financial Stone Age. Investors in Walmart in 1975 saw 90,000 euros turn into 26 million euros 20 years later, not by luck, but by letting compound interest run continuously without interruption.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"5. Why \\\"Later\\\" is the Most Dangerous Excuse\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The core of Chapter 10 is a grim reality check: \"},{\"type\":\"text\",\"text\":\"you can no longer rely on the state pension system.\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The author uses the story of Joseph interpreting Pharaoh's dream as an analogy: seven years of plenty are inevitably followed by seven years of famine. Most people live as if the famine will never come—they don't save enough during the years of plenty. And today's pension system, due to declining birth rates and an aging population, the intergenerational contract can no longer function normally; this is not a pessimistic prediction, but simple demographic mathematics.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"A more realistic problem is that the \\\"famine\\\" often begins before retirement—layoffs, industry decline, health problems—and those without sufficient reserves have no buffer against these shocks.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Another point worth noting from Chapter 10 is about \"},{\"type\":\"text\",\"text\":\"excuses\",\"bold\":true},{\"type\":\"text\",\"text\":\": excuses are lies we tell ourselves. Each of us has two voices inside—the voice of financial failure and the voice of financial success. Whether we achieve financial freedom depends on which one we listen to more often. \\\"I'm not ready yet,\\\" \\\"I'll wait until the conditions are right\\\"—these words sound cautious, but in reality, they are seeking legitimacy for inaction.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"🤔 Personal Interpretation\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Saving itself isn't my problem; in fact, the opposite is true—spending too little is also a form of imbalance. But these three chapters contain a detail worth serious consideration:\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"The definition of a goose account is much stricter than \\\"having a lot of money.\\\"\",\"bold\":true},{\"type\":\"text\",\"text\":\" Money in a checking account, even if substantial, is not a \\\"goose\\\" if it hasn't been allocated to generate cash flow; it's just a pile of money waiting to be spent.\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"So the real question to ask yourself is: \"},{\"type\":\"text\",\"text\":\"How much of the money in my account is truly a \\\"golden egg-laying goose,\\\" and how much is just money that hasn't been spent yet?\",\"bold\":true}]},{\"type\":\"hr\",\"children\":[{\"type\":\"text\",\"text\":\"\"}]},{\"type\":\"h2\",\"children\":[{\"type\":\"text\",\"text\":\"Chapter 11 Principles for Investors and Stock Traders\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"This chapter is the core of the book's investment section, divided into two parts: \"},{\"type\":\"text\",\"text\":\"seven investment principles\",\"bold\":true},{\"type\":\"text\",\"text\":\" and \"},{\"type\":\"text\",\"text\":\"five important decisions that must be made\",\"bold\":true},{\"type\":\"text\",\"text\":\". The author explicitly states that this chapter does not provide specific investment advice, but only discusses underlying principles—because specific products change rapidly, but principles are enduring.\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"Part One: Seven Investment Principles\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"Principle One: Distinguish Between Investing, Speculation, and Saving\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"There is only one criterion:\",\"bold\":true}]},{\"type\":\"blockquote\",\"children\":[{\"type\":\"text\",\"text\":\"Money regularly flows into your pocket from the moment of purchase → Investing. Profit only comes from resale → Speculation. Money sits in a savings account untouched → Saving.\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Specifically:\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Saver\",\"bold\":true},{\"type\":\"text\",\"text\":\": Money goes into an account, no next step. Better than not saving, but money won't significantly appreciate.\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Speculator\",\"bold\":true},{\"type\":\"text\",\"text\":\": Expects to profit from price fluctuations (buy low, sell high). Returns are unstable, no guaranteed regular cash flow. Speculation itself isn't bad—what's bad is \"},{\"type\":\"text\",\"text\":\"thinking you're investing when you're actually speculating\",\"bold\":true},{\"type\":\"text\",\"text\":\".\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"Investor\",\"bold\":true},{\"type\":\"text\",\"text\":\": Regularly receives returns from the moment of purchase, not dependent on resale.\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Several common misconceptions:\",\"bold\":true}]},{\"type\":\"table\",\"children\":[{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Action\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Essence\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Buying watches/art with appreciation potential\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Speculation (profit only from resale)\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Holding stocks to sell when prices rise\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Speculation\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Holding stocks to receive \"},{\"type\":\"text\",\"text\":\"dividends\",\"bold\":true}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Investing (regular cash inflow)\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Owner-occupied property\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Debt (monthly taxes, mortgage interest outflow)\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Rental property (positive net rent)\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Investing\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Well-run company\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Investing\"}]}]}]}],\"props\":{\"align\":[]}},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Regarding stock funds: The author does not oppose them, believing almost everyone cannot avoid them. But it's important to be clear—\"},{\"type\":\"text\",\"text\":\"pure price difference stock funds are speculation, not investment\",\"bold\":true},{\"type\":\"text\",\"text\":\"; only holding for stable dividends counts as investment.\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"Principle Two: Differentiate Between Debt and Investment\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Method of judgment: \"},{\"type\":\"text\",\"text\":\"Does money flow in, or out?\",\"bold\":true}]},{\"type\":\"p\",\"children\":[
