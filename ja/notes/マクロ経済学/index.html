type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"資源の過度な使用、持続不可能\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"マイナスの生産量ギャップ（景気後退期）\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"PPC内側の点\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"資源の遊休、循環的失業が存在\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"回復\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"PPC内側からPPC上の点へ移動\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"生産回復、失業率の低下\"}]}]}]}],\"props\":{\"align\":[]}},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"6.4 拡大≠経済成長\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"これは最も一般的な誤解の一つです。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"拡大\",\"bold\":true},{\"type\":\"text\",\"text\":\"とは、景気後退の谷から回復するプロセスであり、短期的な変動における実質生産量の増加であり、景気循環曲線の上昇局面に対応します。経済が拡大段階にあるとしても、実際の生産量がまだ潜在生産水準に戻っていない場合、依然としてマイナスの生産量ギャップが存在します。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"経済成長（Economic Growth）\",\"bold\":true},{\"type\":\"text\",\"text\":\" とは、潜在生産量自体の向上であり、トレンドラインの上方移動、またはPPC全体の外側への移動を指します。これは人口増加、技術進歩、資本蓄積などの長期的な構造的要因に由来し、短期的な循環的変動とは関係ありません。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"例：\",\"bold\":true},{\"type\":\"text\",\"text\":\" ある国が潜在生産量2兆ドルの水準から1.9兆ドルに景気後退し、その後2兆ドルに回復したとしても、これは短期的な変動からの回復に過ぎず、経済成長ではありません。潜在生産量自体が2兆ドルから2.5兆ドルに増加した場合にのみ、真の経済成長と言えます。\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"6.5 人間の感情と景気循環\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"伝統的な経済学モデルは人間の感情を排除していますが、感情は景気循環を駆動する最も重要な要因の一つである可能性があります。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"拡大局面における感情の変遷\",\"bold\":true},{\"type\":\"text\",\"text\":\"：\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"景気後退が終わったばかりの頃は、人々はまだ警戒心を抱き、回復に懐疑的で、消費や投資をためらいます。時間が経つにつれて、苦痛な記憶は薄れ、人々は自信を取り戻し始め、消費と投資が増加し、経済はさらに拡大します。拡大の後期になると、前回の景気後退からかなり時間が経ち、人々はリスクを過小評価し、過度に楽観的になり、最近の成長を将来に外挿する傾向があります。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"ピークと景気後退局面における感情の変遷：\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"楽観 → 興奮 → 狂乱 → 歓喜 → 不安 → 否定 → 恐怖 → パニック → 絶望\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"谷と回復局面における感情の変遷：\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"絶望 → 落胆 → 希望 → 安堵 → 楽観（新たな循環）\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"この感情のサイクルは株式市場のサイクルと高度に一致しており、実体経済のサイクルとも密接に結びついています。投資の観点から見ると、「最高の投資時期」は感情が最も悲観的な谷の付近に現れることが多く、「最も危険な時期」は感情が最も熱狂的なピークの付近に現れることが多いです。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"⚠️ 伝統的な経済学の総供給・総需要モデルは感情的要因を含んでおらず、これはこれらのモデルの重要な限界の一つです。行動経済学（Behavioral Economics）は、感情や非合理的な行動が経済に与える影響を専門的に研究する新しい分野です。\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"マクロフレームワークとの連携\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"景気循環は、ダリオのフレームワークにおける\"},{\"type\":\"text\",\"text\":\"短期債務サイクル\",\"bold\":true},{\"type\":\"text\",\"text\":\"（5-8年）の統計的表現です。信用拡大は生産量をトレンドラインより高く（プラスの生産量ギャップ）、信用収縮は生産量をトレンドラインより低く（マイナスの生産量ギャップ）押し下げます。本節の感情分析はダリオのフレームワークと高度に一致しています。ダリオも同様に、市場参加者の感情と期待がサイクルを推進する核心的な力であり、単なる経済変数ではないと強調しています。潜在生産量の長期的な上昇トレンドは、ダリオのフレームワークにおける「生産性成長」という基盤となるトレンドラインに対応します。\"}]}]},\"reading\":null}]}]\n"])</script><script>self.__next_f.push([1,"18:I[1259,[],\"IconMark\"]\n8:null\nd:[[\"$\",\"title\",\"0\",{\"children\":\"マクロ経済学 | 再：青年\"}],[\"$\",\"link\",\"1\",{\"rel\":\"canonical\",\"href\":\"https://re-jeunesse.org/ja/notes/%E3%83%9E%E3%82%AF%E3%83%AD%E7%B5%8C%E6%B8%88%E5%AD%A6/\"}],[\"$\",\"link\",\"2\",{\"rel\":\"alternate\",\"hrefLang\":\"zh\",\"href\":\"https://re-jeunesse.org/zh/notes/%E5%AE%8F%E8%A7%82%E7%BB%8F%E6%B5%8E%E5%AD%A6/\"}],[\"$\",\"link\",\"3\",{\"rel\":\"alternate\",\"hrefLang\":\"ja\",\"href\":\"https://re-jeunesse.org/ja/notes/%E3%83%9E%E3%82%AF%E3%83%AD%E7%B5%8C%E6%B8%88%E5%AD%A6/\"}],[\"$\",\"link\",\"4\",{\"rel\":\"alternate\",\"hrefLang\":\"en\",\"href\":\"https://re-jeunesse.org/en/notes/macroeconomics/\"}],[\"$\",\"meta\",\"5\",{\"property\":\"og:title\",\"content\":\"マクロ経済学\"}],[\"$\",\"meta\",\"6\",{\"name\":\"twitter:card\",\"content\":\"summary\"}],[\"$\",\"meta\",\"7\",{\"name\":\"twitter:title\",\"content\":\"マクロ経済学\"}],[\"$\",\"link\",\"8\",{\"rel\":\"icon\",\"href\":\"/icon.svg?ce7055fa98cb49d8\",\"type\":\"image/svg+xml\",\"sizes\":\"any\"}],[\"$\",\"$L18\",\"9\",{}]]\n"])</script></body></html>
