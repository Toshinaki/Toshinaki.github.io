ts\",\"group\":\"\",\"items\":[\"学習\",\"読書\",\"制作\",\"サイクリング\",\"ギター練習\"]},{\"__typename\":\"AuthorInterests\",\"group\":\"やりたいこと\",\"items\":[\"ゲーム開発\",\"3Dプリント\"]}],\"email\":null,\"social\":[{\"__typename\":\"AuthorSocial\",\"platform\":\"github\",\"username\":\"Toshinaki\",\"url\":\"https://github.com/Toshinaki\"},{\"__typename\":\"AuthorSocial\",\"platform\":\"npm\",\"username\":\"toshinaki\",\"url\":\"https://www.npmjs.com/~toshinaki\"},{\"__typename\":\"AuthorSocial\",\"platform\":\"x\",\"username\":\"shaduking\",\"url\":\"https://x.com/shaduking\"},{\"__typename\":\"AuthorSocial\",\"platform\":\"facebook\",\"username\":\"jm.wang42\",\"url\":\"https://www.facebook.com/jm.wang42\"}],\"_sys\":{\"filename\":\"Toshinaki\",\"basename\":\"Toshinaki.json\",\"hasReferences\":null,\"breadcrumbs\":[\"ja\",\"Toshinaki\"],\"path\":\"content/authors/ja/Toshinaki.json\",\"relativePath\":\"ja/Toshinaki.json\",\"extension\":\".json\"},\"id\":\"content/authors/ja/Toshinaki.json\"},\"canonicalId\":\"macro-02-indicators\",\"seriesName\":\"マクロ経済学\",\"title\":\"経済指標と景気循環\",\"order\":3,\"body\":{\"type\":\"root\",\"children\":[{\"type\":\"h2\",\"children\":[{\"type\":\"text\",\"text\":\"1. 国内総生産（GDP）\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"国内総生産（Gross Domestic Product、GDP）\",\"bold\":true},{\"type\":\"text\",\"text\":\" は、一国の経済規模を測る上で最も一般的に用いられる指標です。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"完全な定義：\"},{\"type\":\"text\",\"text\":\"ある国の地理的境界内で、特定の期間に生産されたすべての最終財およびサービスの市場価値。\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"定義中の各単語には特定の意味があり、どれも欠かせません。\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"市場価値（Market Value）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：生産量を数量ではなく価格で測ります。リンゴ1個と自動車1台を生産した場合、GDPへの貢献は全く異なります。市場価格は、人々がその商品に主観的に評価する価値を反映しており、実際の価値を測る最良の代理指標です。\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"最終財およびサービス（Final Goods and Services）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：最終的に使用される商品のみを計算し、生産過程における**中間財（Intermediate Goods）\"},{\"type\":\"text\",\"text\":\"は計算しません。綿花→綿糸→綿布→ジーンズという生産チェーンでは、最終的なジーンズの価値のみを計算し、各段階の価値を重複して加算しません。そうしないと\",\"bold\":true},{\"type\":\"text\",\"text\":\"二重計算（Double Counting）**が発生します。\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"国内生産（Produced Within a Country）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：その国境内で生産されたものであれば、生産者がどの国の人であろうと、どの国の企業であろうと、その国のGDPに計上されます。これは**GNP（国民総生産）**とは異なります。GNPは国籍に基づいて計算され、GDPは地理的な場所に基づいて計算されます。\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"特定の期間（In a Given Period）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：通常、年または四半期を単位とします。同じ商品が異なる期間に重複して計上されることはありません。\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"GDPに計上されないケース：\",\"bold\":true}]},{\"type\":\"table\",\"children\":[{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"計上されないタイプ\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"理由\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"例\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"中間財\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"二重計算を避けるため\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"自動車製造用の鉄鋼\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"中古品の転売\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"生産は過去に行われ、当時のGDPに計上済み\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"中古住宅取引、中古車\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"移転支出\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"新しい財やサービスが生産されていない\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"社会保障給付、年金、失業手当\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"家計内生産\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"市場取引がない\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"自炊、育児\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"違法活動\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"追跡不可能\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"地下経済\"}]}]}]}],\"props\":{\"align\":[]}},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"⚠️ \"},{\"type\":\"text\",\"text\":\"移転支出（Transfer Payment）\",\"bold\":true},{\"type\":\"text\",\"text\":\" はよく混同される点です。政府が退職者に年金を支給してもGDPには計上されません。政府が人を雇って道路を建設すればGDPに計上されます。違いは、新しい財やサービスが生産されたかどうかです。\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"1.1 循環フロー図（Circular Flow Diagram）\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"循環フロー図は、2つの単純化された仮定に基づいています。\"}]},{\"type\":\"ol\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"家計はすべての生産要素を所有している\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"企業はすべての財とサービスを生産している\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"実際には、これら2つの仮定は完全には成り立ちません。多くの生産要素は企業が保有しており、家計も一部の財やサービスを自ら生産します（ただし市場には出回りません）。このモデルの価値は、現実を正確に記述することではなく、論理的な構造を明らかにすることにあります。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"このモデルでは、資金と実物の流れは逆方向に動き、閉じたループを形成します。\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"実物の流れ（時計回り）：生産要素が家計から企業へ流れ、財とサービスが企業から家計へ戻る。\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"貨幣の流れ（反時計回り）：消費支出が家計から企業へ流れ、要素所得（賃金、地代、利子、利潤）が企業から家計へ戻る。\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"img\",\"url\":\"/uploads/notes/circular-flow.png\",\"caption\":null,\"children\":[{\"type\":\"text\",\"text\":\"\"}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"この閉じた循環の中では\",\"bold\":true},{\"type\":\"text\",\"text\":\"、家計がすべての生産要素の唯一の提供者であり、すべての財サービスの唯一の購入者であるため：\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"家計支出 = 企業収入\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"企業収入 = 企業コスト（賃金＋地代＋利子）＋利潤 = 家計収入\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"⚠️ 2番目の等式が成り立つ前提は、「利潤も家計に帰属する」ということです。つまり、企業は家計によって所有され、利潤は最終的に家計に戻るという仮定です。これはモデルの仮定であり、普遍的な事実ではありません。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"したがって、このモデルでは：\"},{\"type\":\"text\",\"text\":\"総支出 = 総収入 = GDP\",\"bold\":true},{\"type\":\"text\",\"text\":\" となり、以下の3つのGDP測定方法の結果は同じになります。\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"1.2 GDPの3つの測定方法\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"3つの方法は同じ経済活動を異なる角度から観察するものであり、結果は完全に等価です。需要側（\"},{\"type\":\"text\",\"text\":\"C+I+G+X-M\",\"code\":true},{\"type\":\"text\",\"text\":\"）と生産側（耐久財/非耐久財/サービス/建設/在庫）の合計結果も完全に同じです。なぜなら、すべての市場取引には買い手と売り手が同時に存在する必要があり、購入総額は生産総額と必然的に等しくなるからです。\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"方法1：支出面アプローチ（Expenditures Approach）\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"最も一般的に用いられる方法です。経済におけるすべての最終財およびサービスの購入支出を合計します。\"}]},{\"type\":\"code_block\",\"value\":\"Y = C + I + G + (X - M)\",\"children\":[{\"type\":\"code_line\",\"children\":[{\"text\":\"Y = C + I + G + (X - M)\"}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"各構成要素の詳細は1.3を参照してください。\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"方法2：所得面アプローチ（Income Approach）\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"すべての生産要素の所得を合計します。\"}]},{\"type\":\"code_block\",\"value\":\"Y = w + i + r + p\",\"children\":[{\"type\":\"code_line\",\"children\":[{\"text\":\"Y = w + i + r + p\"}]}]},{\"type\":\"table\",\"children\":[{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"記号\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"意味\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"w（wages）\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"労働によって得られる賃金\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"i（interest）\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"資本によって得られる利子\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"r（rent）\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"土地によって得られる地代\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"p（profit）\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"企業家能力によって得られる利潤\"}]}]}]}],\"props\":{\"align\":[]}},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"方法3：付加価値アプローチ（Value-Added Approach）\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"生産チェーンの各段階における付加価値を合計します。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"ジーンズを例にとります。\"}]},{\"type\":\"table\",\"children\":[{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"段階\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"生産物の市場価値\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"付加価値\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"綿農家\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"$$10\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"$$10\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"綿糸工場\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"$$20\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"$$10\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"生地工場\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"$$30\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"$$10\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"ジーンズ工場\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"$$50\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"$$20\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"合計\",\"bold\":true}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"$$50\",\"bold\":true}]}]}]}],\"props\":{\"align\":[]}},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"付加価値アプローチの利点：多国籍生産チェーンに適用でき、自国内で新たに生み出された価値のみを計算し、他国で既に創造された価値の二重計算を避けることができます。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"例：\",\"bold\":true},{\"type\":\"text\",\"text\":\" 中国で部品（価値$30）が生産され、米国で最終製品（最終販売価格$50）が組み立てられた商品の場合。付加価値アプローチでは、中国のGDPに$30が加算され、米国のGDPに$20が加算されます（米国国内で新たに生み出された価値のみを計算）。最終製品アプローチを用いると、米国の$50のみが米国GDPに計上され、中国の$30は二重計算されません。どちらの方法でも結果は一致しますが、付加価値アプローチは多国籍サプライチェーンを追跡する際に、より明確です。\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"1.3 支出面アプローチの構成要素\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"C：消費（Consumption）\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"家計による最終財およびサービスへの支出で、\"},{\"type\":\"text\",\"text\":\"新築住宅の購入は含まれません\",\"bold\":true},{\"type\":\"text\",\"text\":\"。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"消費はGDPの中で最大の構成要素であり、米国では約68%を占め、比較的安定しており、大幅な変動はありません。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"含まれるもの：食料品、衣料品、自動車（個人用途）、医療、教育、娯楽など。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"⚠️ \"},{\"type\":\"text\",\"text\":\"教育支出\",\"bold\":true},{\"type\":\"text\",\"text\":\"は、経済学のGDP計算ではC（消費）に分類され、投資ではありません。日常会話では教育を「投資」と見なしますが、経済学の定義と日常会話の定義を区別することが重要です。\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"I：投資（Investment）\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"企業による資本財への支出と、家計による新築住宅の購入を合計したもの。\"}]},{\"type\":\"code_block\",\"value\":\"I = 企業資本支出（設備、ソフトウェア、工場）\\n  + 企業在庫変動（Inventory）\\n  + 家計の新築住宅購入\",\"children\":[{\"type\":\"code_line\",\"children\":[{\"text\":\"I = 企業資本支出（設備、ソフトウェア、工場）\"}]},{\"type\":\"code_line\",\"children\":[{\"text\":\"  + 企業在庫変動（Inventory）\"}]},{\"type\":\"code_line\",\"children\":[{\"text\":\"  + 家計の新築住宅購入\"}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"⚠️ \"},{\"type\":\"text\",\"text\":\"経済学における「投資」≠日常会話における「投資」\",\"bold\":true},{\"type\":\"text\",\"text\":\"：\"}]},{\"type\":\"table\",\"children\":[{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"日常会話\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"経済学GDP計算\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"株式購入\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"投資\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"GDPに計上されない\",\"bold\":true},{\"type\":\"text\",\"text\":\"（単なる資産の転売）\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"債券購入\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"投資\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"GDPに計上されない\",\"bold\":true}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"企業による設備購入\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"投資\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Iに計上される\",\"bold\":true}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"企業の在庫増加\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"—\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Iに計上される\",\"bold\":true}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"家計による新築住宅購入\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"—\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Iに計上される\",\"bold\":true}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"家計による中古住宅購入\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"—\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"GDPに計上されない\",\"bold\":true}]}]}]}],\"props\":{\"align\":[]}},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"投資はGDPの中で最も変動の大きい部分であり、米国では約17%を占めます。新技術や新製品は投資の急増を促すことができますが、信頼感が低下すると投資は急激に縮小する可能性があります。これこそがGDPに周期的な変動が生じる重要な理由の一つです。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"在庫（Inventory）の期間をまたぐ処理：\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"計算期間内に生産チェーンが完了しなかった場合（年末に綿糸が倉庫に残っている場合など）、その中間財の市場価値は当期のGDPに計上されます（投資と見なされます）。次期に最終製品が完成した後、追加された価値のみを計算し（最終製品の価値から既に計上された部分を差し引く）、二重計算を避けます。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"例：\",\"bold\":true},{\"type\":\"text\",\"text\":\" 綿糸（$20）が第1期末に在庫として残っていた場合、第1期のGDPは$20増加します。第2期に綿糸がジーンズ（$50）に加工された場合、第2期のGDPは$30（= $50 - $20）増加し、$50ではありません。そうしないと$20が二重計算されてしまいます。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"なぜ家計による新築住宅の購入がCではなくIに計上されるのか：\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"新築住宅は耐久資本財であり、建設後数十年にわたって居住サービスを提供し続けます。これは経済的性質において、企業が機械設備を購入するのと同様です。どちらも将来にわたる継続的なサービスの流れを得るためのものであり、一度限りの消費ではありません。したがって、購入者が企業であろうと家計であろうと、新築住宅であれば投資に分類されます。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"また、新築住宅の購入をCではなくIに含める方が、追跡や統計が容易です。建設業の生産高は、元々企業の資本支出とともに統計部門によって監視されています。\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"新築住宅の購入 → Iに計上（新たな生産が発生）\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"中古住宅の購入 → GDPに計上されない（単なる資産の転売であり、新たな生産はない）\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"家賃の支払い → Cに計上（居住サービスの購入であり、消費に属する）\"}]}]}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"G：政府支出（Government Spending）\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"各レベルの政府による財およびサービスの購入支出で、\"},{\"type\":\"text\",\"text\":\"移転支出は含まれません\",\"bold\":true},{\"type\":\"text\",\"text\":\"。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"含まれるもの：国防、インフラ建設、公務員の給与、政府調達など。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"含まれないもの：社会保障給付、年金、失業手当などの移転支出。これらの支払いには、対応する新しい財やサービスが生産されていません。政府支出は米国GDPの約18%を占めます（2014年データでは18.4%、長期平均は約20%）。\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"X-M：純輸出（Net Exports）\"}]},{\"type\":\"code_block\",\"value\":\"純輸出 = 輸出（X）- 輸入（M）\",\"children\":[{\"type\":\"code_line\",\"children\":[{\"text\":\"純輸出 = 輸出（X）- 輸入（M）\"}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"輸出（Exports）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：自国で生産され、外国に販売される財およびサービスで、GDPに加算されます。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"輸入（Imports）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：外国で生産され、自国で購入される財およびサービスで、GDPから差し引かれます。これは、消費、投資、政府支出に輸入商品が含まれている可能性があるため、国内生産のみを計算することを確実にするために差し引く必要があります。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"純輸出がプラス → \"},{\"type\":\"text\",\"text\":\"貿易黒字（Trade Surplus）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：輸出 \u003e 輸入\\n純輸出がマイナス → \"},{\"type\":\"text\",\"text\":\"貿易赤字（Trade Deficit）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：輸入 \u003e 輸出\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"輸入相殺の例：\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"米国航空会社がエアバス機（欧州製）を1億ドルで購入した場合：\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"投資I +$1億（米国企業による購入）\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"純輸出X-M -$1億（輸入$1億）\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"GDP純変化 = 0\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"論理：この航空機は米国で生産されたものではないため、米国GDPに計上されるべきではありません。輸出入の相殺により、この点が保証されます。\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"1.4 生産側から見たGDP\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"支出面アプローチは需要側から測定しますが、生産側からGDPを5つのカテゴリに分類することもできます。\"}]},{\"type\":\"table\",\"children\":[{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"カテゴリ\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"米国における割合（2014年）\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"説明\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"サービス（Services）\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"62.1%\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"最大かつ継続的に成長（1960年には30%未満だったが、2014年には62%を超えた）。同時に非耐久財は約40%から約14%に減少し、経済構造がサービス業へと長期的に転換していることを反映している。現代の先進経済では、最も一般的な仕事は実物の製造ではなく、情報の処理やサービスの提供である。\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"耐久財（Durable Goods）\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"16.7%\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"自動車、家電など\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"非耐久財（Nondurable Goods）\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"13.2%\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"食料品、衣料品など\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"建設（Structures）\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"7.4%\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"住宅、工場、商業ビル\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"在庫変動（Change in Inventories）\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"0.6%\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"在庫の増減\"}]}]}]}],\"props\":{\"align\":[]}},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"1.5 GDP公式まとめ\"}]},{\"type\":\"code_block\",\"value\":\"支出法：Y = C + I + G + (X - M)\",\"children\":[{\"type\":\"code_line\",\"children\":[{\"text\":\"支出法：Y = C + I + G + (X - M)\"}]}]},{\"type\":\"code_block\",\"value\":\"所得法：Y = w + i + r + p\",\"children\":[{\"type\":\"code_line\",\"children\":[{\"text\":\"所得法：Y = w + i + r + p\"}]}]},{\"type\":\"code_block\",\"value\":\"付加価値法：Y = Σ 各段階の付加価値\",\"children\":[{\"type\":\"code_line\",\"children\":[{\"text\":\"付加価値法：Y = Σ 各段階の付加価値\"}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"3つの方法の結果は同じです。なぜなら、すべての市場取引は買い手の支出であり、売り手の収入であり、その段階の付加価値でもあるからです。\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"マクロフレームワークとの連携\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"GDPは、ダリオのフレームワークにおける「経済総量」を測る最も直接的な指標です。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"ダリオの価格方程式では、\"},{\"type\":\"text\",\"text\":\"価格 = 総支出 ÷ 商品総量\",\"code\":true},{\"type\":\"text\",\"text\":\" であり、GDP支出面アプローチのC+I+G+(X-M)は、まさにこの「総支出」の正確な分解です。信用拡大はCとIを押し上げ、中央銀行の政策は金利に影響を与え、ひいてはIに影響を与え、政府の財政赤字はGを拡大させます。これらはすべて、ダリオのフレームワークにおける債務サイクルのミクロ的な対応です。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"GDP自体には2つの重要な限界があります。① 名目値であり、インフレを除去して実質成長率を得る必要があります（実質GDP vs 名目GDP、後の章で詳しく説明します）。② 富の分配、環境劣化、家計生産などの非市場活動を測定しないため、社会福祉と直接的に同等視することはできません。\"}]},{\"type\":\"h2\",\"children\":[{\"type\":\"text\",\"text\":\"2. GDPの限界と代替指標\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"2.1 一人当たりGDP（GDP per capita）\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"GDPの限界について議論する前に、よく使われる派生指標を導入します。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"一人当たりGDP（GDP per capita）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：GDPを人口数で割ったもので、一国の平均的な生活水準を大まかに測るために用いられます。\"}]},{\"type\":\"code_block\",\"value\":\"GDP per capita = GDP ÷ 人口数量\",\"children\":[{\"type\":\"code_line\",\"children\":[{\"text\":\"GDP per capita = GDP ÷ 人口数量\"}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"国際的な人口移動は通常、一人当たりGDPの低い国から高い国へと流れる傾向があり、これは生活水準の差異の一部を確かに捉えていることを示しています。しかし、それはあくまで粗い指標に過ぎません。これこそが本節で議論する核心的な問題です。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"名目一人当たりGDPには、もう一つ国際比較における限界があります。国によって物価水準が大きく異なり、同じ金額で買えるものが国によって大きく違うためです。したがって、国際比較を行う際には、通常、**購買力平価調整後の一人当たりGDP（GDP per capita PPP、Purchasing Power Parity）**を使用する必要があります。これは、統一された「国際価格」を用いて各国の生産量を再評価するものです。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"例：\",\"bold\":true},{\"type\":\"text\",\"text\":\" ルクセンブルクは人口が非常に少なく、名目GDP総額は大きくありませんが、一人当たりGDPは米国をはるかに上回ります。PPPで調整すると、カタールの順位がさらに高くなります。これは、現地の物価水準により、同じ金額でより多くの財やサービスを購入できるためです。\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"2.2 GDPの限界\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"GDPは現在最も広く使われている経済指標ですが、設計当初から社会福祉を測るものではありませんでした。それは\"},{\"type\":\"text\",\"text\":\"市場生産物\",\"bold\":true},{\"type\":\"text\",\"text\":\"を測るものであり、**生活の質（Quality of Life）**を測るものではありません。両者は密接に関連していますが、同等ではありません。\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"計上されない経済活動\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"非市場取引（Non-market Transactions）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：市場での交換が発生しない限り、実際の価値がどれほど高くてもGDPはそれを捉えることができません。\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"自分で子供の世話をする vs ベビーシッターを雇う：後者はGDPに計上されるが、前者は計上されない。しかし、提供されるサービスは全く同じである。\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"自分で車を運転して人を送る vs タクシーに乗る：後者はGDPに計上されるが、前者は計上されない。\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"自分で野菜を育てて食べる：GDPに計上されない。\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"これにより、興味深い統計現象が生じます。より多くの女性が労働市場に参入するにつれて、元々家庭内で提供されていたサービス（料理、育児など）が市場に移転し、GDPが上昇します。しかし、これは社会が実際に消費するサービス総量が増加したことを意味するのではなく、統計上の可視性が向上したに過ぎません。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"地下経済と違法活動\",\"bold\":true},{\"type\":\"text\",\"text\":\"：現金取引の未申告、闇市場取引などはすべてGDPに計上されません。推定では、米国の地下経済の規模はGDPの約6.6%を占めます（2013年で約2兆ドル）。\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"GDPでは測れない側面\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"所得不平等（Income Inequality）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：一人当たりGDPは平均値に過ぎません。GDPが5%成長したとしても、全員が5%成長したことを意味するかもしれませんし、少数の人が大幅に成長し、大多数の人がほとんど変化しなかったことを意味するかもしれません。GDPは分配の問題については全く語りません。\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"余暇時間\",\"bold\":true},{\"type\":\"text\",\"text\":\"：米国の一人当たりGDPはドイツよりも高いですが、ドイツの労働者は米国よりも年間数百時間労働時間が短いです。追加の休暇時間はGDPには反映されませんが、明らかに生活の質の一部です。\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"環境の質（Sustainability）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：GDPは汚染防止設備の購入支出を計上しますが、空気や水が実際にきれいになったかどうかは測りません。GDPが急速に成長しているが環境が深刻に悪化している国では、GDPの数字は繁栄を示しますが、実際の生活の質は低下している可能性があります。\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"経済的弊害（Economic Bads）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：あらゆる経済活動によって引き起こされる、社会に負の価値をもたらす結果。例えば、自動車による大気汚染は人間の健康と環境を損ないます。持続不可能な経済成長は、その国の人々の生活の質を低下させる可能性があります。\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"健康と教育の実際の水準\",\"bold\":true},{\"type\":\"text\",\"text\":\"：GDPは医療支出を計上しますが、平均寿命が延びたかどうかは測りません。GDPは教育支出を計上しますが、識字率や学習成果は測りません。\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"技術進歩と製品の多様性\",\"bold\":true},{\"type\":\"text\",\"text\":\"：1950年代には、どれほど裕福であってもスマートフォンを買うことはできませんでした。GDPは技術進歩がもたらす生活の質の向上を測ることができず、製品の種類が増えることで消費者が享受する恩恵も反映できません。\"}]}]}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"GDPは生活水準の向上を過大評価することも過小評価することもある\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"過小評価の可能性\",\"bold\":true},{\"type\":\"text\",\"text\":\"：過去1世紀で労働時間は大幅に短縮されました。平均寿命と教育水準は著しく向上しました。技術進歩がもたらす価値は十分に計上できません。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"過大評価の可能性\",\"bold\":true},{\"type\":\"text\",\"text\":\"：元々家計（主に女性）によって提供されていた非市場サービスが市場に移転したことでGDPが押し上げられましたが、実際の消費量が増加したとは限りません。犯罪、交通渋滞、所得不平等の拡大などが一部のGDPを押し上げましたが、生活の質は低下させました。\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"2.3 関連派生指標\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"GDP以外にも、いくつか関連する経済指標を知っておく価値があります。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"国民総生産（GNP，Gross National Product）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：自国の国民および企業が世界中で生産したものを、どの国で生産されたかに関わらず計算します。\"}]},{\"type\":\"code_block\",\"value\":\"GNP = GDP + 自国居住者の海外からの所得 - 外国居住者の自国からの所得\",\"children\":[{\"type\":\"code_line\",\"children\":[{\"text\":\"GNP = GDP + 自国居住者の海外からの所得 - 外国居住者の自国からの所得\"}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"GDPは地理的境界に注目し、GNPは国籍に注目します。海外で働き、本国に送金する人口が多い小国では、両者の差は大きい可能性があります。米国の場合、その差は約0.2%です。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"国民純生産（NNP，Net National Product）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：GNPから資本減耗を差し引いたもの。\"}]},{\"type\":\"code_block\",\"value\":\"NNP = GNP - 減価償却（Depreciation）\",\"children\":[{\"type\":\"code_line\",\"children\":[{\"text\":\"NNP = GNP - 減価償却（Depreciation）\"}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"減価償却（Depreciation）\",\"bold\":true},{\"type\":\"text\",\"text\":\" は、資本が時間の経過とともに老朽化して失われる価値です。GDPは新規資本投資を全額計上しますが、旧資本の損耗を無視するため、資本減耗が速い経済では、GDPが実際の経済活動水準を過大評価する可能性があります。NNPは減価償却を差し引くことで、「純粋な新規富」により近い指標を提供します。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"国民所得（National Income）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：NNPをさらに細分化したもので、すべての労働所得と資本所得（賃金、利潤、地代、利子）を含みます。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"⚠️ 実際に使用する際にはすべての定義を覚える必要はありませんが、異なる国や異なる年のデータを比較する際には、同じ指標（GDP vs GNP vs NNP）を比較していることを確認する必要があります。そうしないと結論が歪む可能性があります。\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"2.4 代替的な総合指標\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"GDPの限界を補うため、様々な機関がより包括的な生活の質を測るツールを開発しています。\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"人間開発指数（HDI，Human Development Index）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：国連が開発した総合指標で、健康（平均寿命）、教育（就学年数）、所得（一人当たりGNI）の3つの側面をカバーしています。\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"真の進歩指標（GPI，Genuine Progress Indicator）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：GDPを基礎とし、ボランティア活動、家事労働などのポジティブな非市場活動の価値を加え、同時に犯罪コスト、環境破壊、資源枯渇、所得不平等などのネガティブな要素を差し引いたものです。\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"ハッピー・プラネット指数（HPI，Happy Planet Index）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：幸福度調査、平均寿命、社会的不平等度、エコロジカル・フットプリントを総合し、ある国が持続可能な人間の幸福をどの程度達成しているかを測るものです。\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"これらの指標はGDPランキングと一致しないことがよくあります。GDPランキングで上位の国が、幸福度や持続可能性の指標で必ずしも上位にいるとは限りません。\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"2.5 GDPの位置づけ\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"GDPは\"},{\"type\":\"text\",\"text\":\"市場生産物\",\"bold\":true},{\"type\":\"text\",\"text\":\"を正確かつ有用に測定します。雇用状況、所得水準、経済の拡大または収縮を効果的に反映し、短期的な景気状況を判断する上で最良の単一指標です。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"しかし、それは生活の質を正確に測るものではなく、異なる発展段階の国を比較する場合、成長の持続可能性を評価する場合、社会公平問題を分析する場合、あるいは政策が一般の人々の実際の生活に与える影響を判断する場合など、以下のシナリオでは他の側面を補完する必要があります。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"実用的な認識フレームワーク：GDPは経済活動の温度計であり、幸福のバロメーターではありません。両者は通常同じ方向に変動しますが、限界的には乖離が生じることがあります。\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"マクロフレームワークとの連携\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"ダリオのフレームワークにおける「経済総量」は主にGDPによって測定され、これは短期債務サイクル（拡大期にはGDP成長、景気後退期にはGDP収縮）を分析する際に適切なツールです。しかし、長期的な生産性成長を評価する際には、GDPの限界に注意する必要があります。技術進歩、労働時間の短縮、環境改善などが生活の質に実質的な向上をもたらしても、GDPの数字では過小評価されたり、欠落したりすることがよくあります。これが、「一人当たり実質GDP成長率」が長期的な生産性進歩を測る代理指標に過ぎず、生活水準の向上と直接的に同等ではない理由です。\"}]},{\"type\":\"h2\",\"children\":[{\"type\":\"text\",\"text\":\"3. 失業率\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"3.1 人口の階層構造\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"失業率を理解するためには、まず人口がどのように階層化されているかを理解する必要があります。\"}]},{\"type\":\"code_block\",\"lang\":\"mermaid\",\"value\":\"flowchart TD\\n    A[\\\"全人口\\\"]\\n    B[\\\"生産年齢人口\\\\n収監されていない、現役軍人ではない\\\"]\\n    C[\\\"労働力人口\\\"]\\n    D[\\\"非労働力人口\\\\n退職者、学生など\\\"]\\n    E[\\\"就業者\\\\n有償労働（週1時間でも）\\\"]\\n    F[\\\"失業者\\\\n無職 + 過去4週間以内に積極的に求職\\\"]\\n    G[\\\"求職意欲喪失者\\\\n求職を諦めた者\\\"]\\n\\n    A --\u003e B\\n    B --\u003e C\\n    B --\u003e D\\n    C --\u003e E\\n    C --\u003e F\\n    F -.-\u003e|労働力人口から離脱| G\\n    G --\u003e D\\n\\n    H[\\\"失業率 UR = 失業者数 ÷ 労働力人口総数 × 100%\\\"]\\n    I[\\\"労働力率 LFPR = 労働力人口 ÷ 生産年齢人口 × 100%\\\"]\",\"children\":[{\"type\":\"code_line\",\"children\":[{\"text\":\"flowchart TD\"}]},{\"type\":\"code_line\",\"children\":[{\"text\":\"    A[\\\"全人口\\\"]\"}]},{\"type\":\"code_line\",\"children\":[{\"text\":\"    B[\\\"生産年齢人口\\\\n収監されていない、現役軍人ではない\\\"]\"}]},{\"type\":\"code_line\",\"children\":[{\"text\":\"    C[\\\"労働力人口\\\"]\"}]},{\"type\":\"code_line\",\"children\":[{\"text\":\"    D[\\\"非労働力人口\\\\n退職者、学生など\\\"]\"}]},{\"type\":\"code_line\",\"children\":[{\"text\":\"    E[\\\"就業者\\\\n有償労働（週1時間でも）\\\"]\"}]},{\"type\":\"code_line\",\"children\":[{\"text\":\"    F[\\\"失業者\\\\n無職 + 過去4週間以内に積極的に求職\\\"]\"}]},{\"type\":\"code_line\",\"children\":[{\"text\":\"    G[\\\"求職意欲喪失者\\\\n求職を諦めた者\\\"]\"}]},{\"type\":\"code_line\",\"children\":[{\"text\":\"\"}]},{\"type\":\"code_line\",\"children\":[{\"text\":\"    A --\u003e B\"}]},{\"type\":\"code_line\",\"children\":[{\"text\":\"    B --\u003e C\"}]},{\"type\":\"code_line\",\"children\":[{\"text\":\"    B --\u003e D\"}]},{\"type\":\"code_line\",\"children\":[{\"text\":\"    C --\u003e E\"}]},{\"type\":\"code_line\",\"children\":[{\"text\":\"    C --\u003e F\"}]},{\"type\":\"code_line\",\"children\":[{\"text\":\"    F -.-\u003e|労働力人口から離脱| G\"}]},{\"type\":\"code_line\",\"children\":[{\"text\":\"    G --\u003e D\"}]},{\"type\":\"code_line\",\"children\":[{\"text\":\"\"}]},{\"type\":\"code_line\",\"children\":[{\"text\":\"    H[\\\"失業率 UR = 失業者数 ÷ 労働力人口総数 × 100%\\\"]\"}]},{\"type\":\"code_line\",\"children\":[{\"text\":\"    I[\\\"労働力率 LFPR = 労働力人口 ÷ 生産年齢人口 × 100%\\\"]\"}]}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"生産年齢人口（Eligible Population）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：16歳以上で、収監されておらず、現役軍人ではない人口。\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"労働力人口（Labor Force）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：生産年齢人口のうち、現在仕事をしているか、積極的に仕事を探している人。\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"就業者（Employed）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：統計調査週内に1時間でも有償労働をした場合、就業者とみなされる。\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"失業者（Unemployed）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：調査週内に全く仕事がなく、かつ過去4週間以内に積極的に仕事を探していた人。\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"⚠️ 「積極的に仕事を探していた」が重要な限定詞です。仕事がないが過去4週間以内に自ら求職活動をしていない人（例えば、探すのを諦めた人）は、失業者には計上されず、「非労働力人口」に分類されます。\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"3.2 主要計算式\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"労働力人口：\",\"bold\":true}]},{\"type\":\"code_block\",\"value\":\"労働力人口 = 就業者数 + 失業者数\",\"children\":[{\"type\":\"code_line\",\"children\":[{\"text\":\"労働力人口 = 就業者数 + 失業者数\"}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"失業率（Unemployment Rate，UR）：\",\"bold\":true}]},{\"type\":\"code_block\",\"value\":\"失業率 = 失業者数 ÷ 労働力人口総数 × 100%\",\"children\":[{\"type\":\"code_line\",\"children\":[{\"text\":\"失業率 = 失業者数 ÷ 労働力人口総数 × 100%\"}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"労働力率（Labor Force Participation Rate，LFPR）：\",\"bold\":true}]},{\"type\":\"code_block\",\"value\":\"LFPR = 労働力人口 ÷ 生産年齢人口 × 100%\",\"children\":[{\"type\":\"code_line\",\"children\":[{\"text\":\"LFPR = 労働力人口 ÷ 生産年齢人口 × 100%\"}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"LFPRは、生産年齢人口のうち実際に労働市場に参加している割合を測るもので、失業率変動の背景にある原因を理解するための重要な補完指標です。\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"失業率の統計方法（米国）\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"米国労働統計局（Bureau of Labor Statistics）は、毎月約6万世帯を対象に調査を行い、その雇用状況と求職状況を尋ね、それに基づいて全国データを推計しています。これは標本調査であり、全数調査ではありません。\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"3.3 失業率の限界\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"失業率の最も重要な限界は、\"},{\"type\":\"text\",\"text\":\"その分母（労働力人口）自体が経済状況の良し悪しによって変化する\",\"bold\":true},{\"type\":\"text\",\"text\":\"ため、失業率が判断を誤らせる可能性があることです。\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"経済が悪化すると、失業率が過小評価される可能性がある\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"経済が低迷し続けると、一部の失業者は長期にわたって仕事が見つからないために求職を諦め、**求職意欲喪失者（Discouraged Workers）**となります。彼らは労働力人口統計から外れるため、以下の結果を招きます。\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"失業者数が減少する（分子が小さくなる）\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"労働力人口総数も減少する（分母が小さくなる）\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"失業率が逆に低下する可能性がある。しかし、これは雇用状況が改善したことを意味しない。\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"例：\",\"bold\":true},{\"type\":\"text\",\"text\":\" 元々1500万人の失業者、労働力人口1億5400万人で、失業率は9.7%だったとします。もし500万人が挫折して労働力人口から離脱した場合、失業者数は1000万人に減少し、労働力人口は1億4900万人に減少するため、失業率は6.7%になります。経済は実際には悪化しているのに、数字上は改善したように見えます。\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"経済が好転すると、失業率が過大評価される可能性がある\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"経済が改善すると、元々労働力人口から離脱していた人々が再び求職活動を始め、失業者として再計上されるため、以下の結果を招きます。\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"失業者数が増加する（分子が大きくなる）\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"労働力人口総数も増加する（分母が大きくなる）\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"失業率が一時的に上昇する可能性がある。しかし、これはまさに経済が好転し、人々が求職意欲を取り戻したことを反映している。\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"したがって、雇用市場の真の状況をより完全に判断するためには、\"},{\"type\":\"text\",\"text\":\"失業率と労働力率を同時に観察すべきです\",\"bold\":true},{\"type\":\"text\",\"text\":\"。失業率が低下すると同時にLFPRも低下している場合、それは雇用が真に改善したのではなく、求職意欲喪失者が増加した可能性を示唆しています。\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"その他の限界\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"不完全雇用（Underemployed）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：フルタイムの仕事を希望しているが、パートタイムの仕事しか見つけられない人は、就業者としてカウントされ、失業率には計上されませんが、彼らの資源は十分に活用されていません。\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"3.4 3つの失業タイプ\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"失業率は2つの部分に分解できます。\"},{\"type\":\"text\",\"text\":\"自然失業率\",\"bold\":true},{\"type\":\"text\",\"text\":\"と\"},{\"type\":\"text\",\"text\":\"循環的失業\",\"bold\":true},{\"type\":\"text\",\"text\":\"です。\"}]},{\"type\":\"code_block\",\"value\":\"失業率 = 自然失業率（NRU）+ 循環的失業率\",\"children\":[{\"type\":\"code_line\",\"children\":[{\"text\":\"失業率 = 自然失業率（NRU）+ 循環的失業率\"}]}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"自然失業率（Natural Rate of Unemployment，NRU）\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"経済が最適な状態、完全雇用で稼働している時でも存在する失業率です。\"},{\"type\":\"text\",\"text\":\"自然失業率 = 摩擦的失業 + 構造的失業\",\"code\":true},{\"type\":\"text\",\"text\":\" であり、決してゼロにはなりません。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"摩擦的失業（Frictional Unemployment）\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"求職プロセス自体に摩擦と時間的コストが存在します。履歴書の送付、面接、採用待ちなど、このプロセスは瞬時に完了するものではありません。労働者のスキルが市場の需要に完全に合致していても、適切な職を見つけるには時間がかかります。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"典型的な例：卒業したばかりの大学生が初めての仕事を探している場合。ある会社を辞めて次の仕事を探している人。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"摩擦的失業は悪いことではありません。それは労働者が仕事を選ぶ自由を持っていることを意味します。技術進歩（求人サイト、採用アプリなど）は摩擦的失業を減らすことができますが、ゼロにすることはありません。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"構造的失業（Structural Unemployment）\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"労働者のスキルと雇用主の需要との間に構造的なミスマッチが存在し、通常、経済構造の根本的な変化によって引き起こされます。新技術が旧技術に取って代わり、新産業が旧産業に取って代わるなどです。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"典型的な例：自動車が普及した後に馬車の御者が失業する。エネルギー転換後に炭鉱労働者が失業する。製造業の労働者が自動化機械に置き換えられる。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"構造的失業は、労働者が新しいスキルを習得したり、新しい地域へ移動したりする必要があるため、消化されるまでに比較的長い時間がかかります。\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"循環的失業（Cyclical Unemployment）\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"景気循環（景気後退と景気拡大）によって引き起こされる失業で、実際の失業率と自然失業率の差に等しいものです。\"}]},{\"type\":\"code_block\",\"value\":\"循環的失業率 = 実際の失業率 - 自然失業率\",\"children\":[{\"type\":\"code_line\",\"children\":[{\"text\":\"循環的失業率 = 実際の失業率 - 自然失業率\"}]}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"景気後退期：循環的失業は\"},{\"type\":\"text\",\"text\":\"プラス\",\"bold\":true},{\"type\":\"text\",\"text\":\"となり、実際の失業率は自然失業率よりも高くなる。\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"景気拡大期：循環的失業は\"},{\"type\":\"text\",\"text\":\"マイナス\",\"bold\":true},{\"type\":\"text\",\"text\":\"となることがあり、実際の失業率は自然失業率よりも低くなる。この時、企業は人手不足のため採用基準を下げ、通常であればまだ求職活動中の摩擦的失業者を雇用する。\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"3つの失業タイプの比較：\",\"bold\":true}]},{\"type\":\"table\",\"children\":[{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"タイプ\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"原因\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"解消方法\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"摩擦的（Frictional）\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"求職プロセスに時間がかかる\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"情報マッチング効率の改善\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"構造的（Structural）\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"スキルと需要のミスマッチ\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"再訓練、産業転換\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"循環的（Cyclical）\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"景気後退\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"財政/金融政策による需要刺激\"}]}]}]}],\"props\":{\"align\":[]}},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"3.5 完全雇用と自然失業率\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"完全雇用（Full Employment）\",\"bold\":true},{\"type\":\"text\",\"text\":\" は失業ゼロを意味するのではなく、経済がPPC上で効率的に稼働し、失業率が自然失業率に等しい状態を指します。この時、摩擦的失業と構造的失業のみが存在し、循環的失業はありません。\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"実際の失業率 \u003e NRUの場合：経済はPPCの内側で稼働しており、資源の遊休が存在する。\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"実際の失業率 \u003c NRUの場合：経済は一時的にPPCの外側で稼働しており、持続不可能である。\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"NRU自体も時間とともにゆっくりと変化します。構造的変化が加速する場合（技術革命など）はNRUが上昇する可能性があります。求職マッチング効率が向上する場合はNRUが低下する可能性があります。\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"マクロフレームワークとの連携\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"ダリオのフレームワークでは、失業率は短期債務サイクルの最も直接的な社会的表現の一つです。信用収縮→企業収入減少→人員削減→循環的失業増加。中央銀行の利下げまたは政府の財政刺激→需要回復→循環的失業減少。摩擦的失業と構造的失業は、ダリオのフレームワークにおける「生産性成長」の構造的制約に対応します。技術代替と産業転換は構造的失業を継続的に生み出し、これは経済進歩の避けられない副産物であり、金融政策や財政政策で解消することはできず、教育と再訓練によってのみ緩和できます。\"}]},{\"type\":\"h2\",\"children\":[{\"type\":\"text\",\"text\":\"4. インフレーション\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"インフレーション（Inflation）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：経済における全体的な物価水準の持続的な上昇であり、貨幣の購買力低下を引き起こします。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"2つの限定詞に注意してください。\"},{\"type\":\"text\",\"text\":\"全体的\",\"bold\":true},{\"type\":\"text\",\"text\":\"（ある特定の商品が値上がりするのではなく）と\"},{\"type\":\"text\",\"text\":\"持続的\",\"bold\":true},{\"type\":\"text\",\"text\":\"（短期的な変動ではない）です。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"インフレ率（Inflation Rate）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：物価水準がある期間から次の期間へのパーセンテージ変化。\"}]},{\"type\":\"code_block\",\"value\":\"インフレ率 = (新しい物価水準 - 古い物価水準) ÷ 古い物価水準 × 100%\",\"children\":[{\"type\":\"code_line\",\"children\":[{\"text\":\"インフレ率 = (新しい物価水準 - 古い物価水準) ÷ 古い物価水準 × 100%\"}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"⚠️ 歴史的に「インフレーション」という言葉は元々貨幣供給の膨張（貨幣型）を指していましたが、現代経済学ではインフレはデフォルトで\"},{\"type\":\"text\",\"text\":\"物価インフレ\",\"bold\":true},{\"type\":\"text\",\"text\":\"を指します。両者は関連していますが、完全に同等ではありません。貨幣供給の増加がすぐに物価上昇を引き起こすとは限らず、短期的には供給ショックなどの要因にも影響される可能性があります。\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"4.1 CPI：インフレの測定方法\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"バスケット商品のロジック\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"インフレを測定するには基準が必要です。ある特定の商品価格だけを見るのではなく、\"},{\"type\":\"text\",\"text\":\"代表的な消費者\",\"bold\":true},{\"type\":\"text\",\"text\":\"が購入する一連の財とサービスの価格変化を見る必要があります。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"消費者物価指数（Consumer Price Index，CPI）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：固定された「バスケット」の財およびサービスの総コストの時間的変化を追跡し、典型的な都市世帯の生活費の変化を測定します。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"市場バスケット（Market Basket）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：CPIの計算に用いられる固定された商品組み合わせで、毎年変更されません。バスケット内の各商品のウェイトは、実際の消費者の支出割合に基づいて決定されます。消費者がより多くのお金を使う商品ほど、CPIへの影響も大きくなります。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"基準年（Base Year）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：比較参照となる年で、そのCPIは100に設定されます。どの年を基準年として選択するかは任意であり、インフレ率の計算結果には影響しません。\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"CPIの計算手順\"}]},{\"type\":\"ol\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"バスケット商品の構成と数量を決定する\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"基準年にそのバスケットを購入する総コストを計算する\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"目標年にそのバスケットを購入する総コストを計算する\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"CPI = (目標年コスト ÷ 基準年コスト) × 100\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"例（簡略版）：\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"バスケットには2つの商品のみが含まれると仮定します。\"}]},{\"type\":\"table\",\"children\":[{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"商品\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"数量\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"基準年単価\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"目標年単価\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"パン\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"10個\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"$$2\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"$$3\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"牛乳\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"5リットル\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"$$4\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"$$4\"}]}]}]}],\"props\":{\"align\":[]}},{\"type\":\"code_block\",\"value\":\"基準年コスト = 10×$2 + 5×$4 = $40\\n目標年コスト = 10×$3 + 5×$4 = $50\\n\\nCPI（目標年）= ($50 ÷ $40) × 100 = 125\",\"children\":[{\"type\":\"code_line\",\"children\":[{\"text\":\"基準年コスト = 10×$2 + 5×$4 = $40\"}]},{\"type\":\"code_line\",\"children\":[{\"text\":\"目標年コスト = 10×$3 + 5×$4 = $50\"}]},{\"type\":\"code_line\",\"children\":[{\"text\":\"\"}]},{\"type\":\"code_line\",\"children\":[{\"text\":\"CPI（目標年）= ($50 ÷ $40) × 100 = 125\"}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"CPIが125であることは、基準年と比較して、同じバスケットを購入するのに現在25%多く費用がかかることを意味します。\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"インフレ率の計算\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"2つの期間のCPIがあれば、インフレ率の計算は標準的なパーセンテージ変化です。\"}]},{\"type\":\"code_block\",\"value\":\"インフレ率 = (CPI₂ - CPI₁) ÷ CPI₁ × 100%\",\"children\":[{\"type\":\"code_line\",\"children\":[{\"text\":\"インフレ率 = (CPI₂ - CPI₁) ÷ CPI₁ × 100%\"}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"例：\",\"bold\":true},{\"type\":\"text\",\"text\":\" ある年のCPIが125で、翌年のCPIが130だった場合：\"}]},{\"type\":\"code_block\",\"value\":\"インフレ率 = (130 - 125) ÷ 125 × 100% = 4%\",\"children\":[{\"type\":\"code_line\",\"children\":[{\"text\":\"インフレ率 = (130 - 125) ÷ 125 × 100% = 4%\"}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"⚠️ CPIの数字を直接引き算してインフレ率を求めることはできません（例：130-125=5%）。基準期のCPIで割る必要があります。両者が近い場合は誤差は小さいですが、正確な計算には公式を使用しなければなりません。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"⚠️ インフレの複利計算：毎年2%のインフレがあった場合、10年後の価格は20%上昇するのではなく、約22%上昇します（複利効果）。\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"4.2 名目変数と実質変数\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"これはインフレの影響を理解するための核心的なツールであり、インフレと投資決定を結びつける鍵でもあります。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"名目変数（Nominal Variables）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：インフレ調整されていない帳簿上の数字で、名目賃金、名目金利などです。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"実質変数（Real Variables）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：インフレ調整後、真の購買力を反映する変数です。\"}]},{\"type\":\"code_block\",\"value\":\"実質金利 ≈ 名目金利 - インフレ率\",\"children\":[{\"type\":\"code_line\",\"children\":[{\"text\":\"実質金利 ≈ 名目金利 - インフレ率\"}]}]},{\"type\":\"code_block\",\"value\":\"実質賃金上昇率 ≈ 名目賃金上昇率 - インフレ率\",\"children\":[{\"type\":\"code_line\",\"children\":[{\"text\":\"実質賃金上昇率 ≈ 名目賃金上昇率 - インフレ率\"}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"例：\",\"bold\":true},{\"type\":\"text\",\"text\":\" 銀行預金の名目金利が3%、インフレ率が5%の場合、実質金利 = 3% - 5% = -2%です。帳簿上は儲かっているように見えても、実際の購買力は減少しています。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"購買力（Purchasing Power）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：一定量の貨幣で実際に購入できる商品の量。インフレ率が高いほど、貨幣の購買力は速く低下します。\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"4.3 CPIの限界\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"CPIは現在最も広く使われているインフレ測定ツールですが、2つの系統的なバイアスがあり、実際の生活費の上昇を\"},{\"type\":\"text\",\"text\":\"過大評価\",\"bold\":true},{\"type\":\"text\",\"text\":\"する傾向があります。\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"代替バイアス（Substitution Bias）\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"CPIは、消費者が毎年全く同じバスケット商品を購入すると仮定していますが、現実には、ある商品の価格が上昇すると、消費者は比較的安価な代替品に切り替えます。固定されたバスケットではこの行動調整を捉えることができないため、生活費の上昇を過大評価してしまいます。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"例：\",\"bold\":true},{\"type\":\"text\",\"text\":\" 牛肉が値上がりすると、消費者は鶏肉に切り替えます。CPIは依然として元の牛肉購入量で計算されますが、実際の消費者は牛肉への支出を減らしています。\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"品質/新商品バイアス（Quality/New Goods Bias）\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"固定されたバスケットでは、商品の品質向上や新商品の登場を十分に反映できません。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"品質向上\",\"bold\":true},{\"type\":\"text\",\"text\":\"：今日の自動車は20年前の自動車よりも多くの安全装備を備えており、価格は高いですが機能もより強力です。CPIは価格上昇をすべてインフレとして計上する可能性があり、品質改善の部分を無視してしまいます。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"新商品\",\"bold\":true},{\"type\":\"text\",\"text\":\"：バスケット商品の更新は市場に遅れます。新製品は発売当初が最も価格が高く、その後徐々に下降します。しかし、CPIバスケットの更新が遅れるため、新製品が組み込まれる頃には価格はすでにしばらく下降しており、CPIはこの価格下降プロセスを見逃し、結果としてインフレを過大評価してしまいます。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"2つのバイアスを総合すると、CPIは毎年実際のインフレを約0.5パーセントポイント過大評価している可能性があります。\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"4.4 目的による異なる物価指数の選択\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"この節では複数の物価指数を導入しますが、その核心的なロジックは、\"},{\"type\":\"text\",\"text\":\"「最良」の指数はなく、「この問題に最も適した」指数があるだけ\",\"bold\":true},{\"type\":\"text\",\"text\":\"ということです。\"}]},{\"type\":\"table\",\"children\":[{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"指数\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"英語\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"測定対象\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"主な用途\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"消費者物価指数\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"CPI\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"都市世帯が購入するバスケット商品\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"家計の生活費を測る、ニュースで報じられる「インフレ率」\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"コアインフレ指数\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"Core CPI\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"CPIから食料とエネルギーを除いた部分\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"中央銀行の政策決定、短期的な変動を除外\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"GDPデフレーター\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"GDP Deflator\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"すべてのGDP構成要素の価格\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"最も包括的な物価水準の測定、実質GDPの計算に用いられる\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"生産者物価指数\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"PPI\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"生産者が購入する原材料と中間財\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"CPIの先行指標、消費サイドのインフレ動向を予測\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"雇用コスト指数\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"ECI\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"労働市場の賃金\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"労働コストのインフレを測る\"}]}]}]}],\"props\":{\"align\":[]}},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"なぜコアインフレが必要なのか：\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"食料品とエネルギー価格は、天候や地政学などの短期的な要因により激しく変動します。ハリケーンが1ヶ月間原油価格を押し上げたとしても、それが基調的なインフレトレンドの変化を意味するわけではなく、中央銀行はそれに基づいて金利政策を調整すべきではありません。コアインフレはこれらのノイズを除去し、政策立案者がより持続的なインフレトレンドを見ることを可能にします。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"なぜGDPデフレーターは生活費の測定に適さないのか：\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"それは家計が購入しない商品（軍用機、工場設備など）を含んでいるため、一般消費者の生活費の変化を正確に反映することはできません。しかし、それは\"},{\"type\":\"text\",\"text\":\"実質GDP\",\"bold\":true},{\"type\":\"text\",\"text\":\"（インフレを除去したGDP）を計算する上で最も正確なツールです。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"PPIがCPIに先行するロジック：\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"生産コストの上昇（PPIの上昇）は、通常数ヶ月後に消費者価格（CPIの上昇）に転嫁されます。PPIの動向を観察することで、CPIの変動方向を事前に予測することができます。\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"4.5 インフレの勝者と敗者\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"予想インフレと予想外インフレ\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"インフレが異なるグループに与える影響は、ある重要な前提に依存します。それは\"},{\"type\":\"text\",\"text\":\"インフレが予想の範囲内であったかどうか\",\"bold\":true},{\"type\":\"text\",\"text\":\"です。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"予想インフレ（Anticipated Inflation）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：貸し手と借り手が契約を締結する際に、インフレ予想を名目金利に既に織り込んでいるため、実際の影響は限定的です。もし双方が5%のインフレを予想していれば、名目金利にはこの5%の補償が含まれ、実質金利はほぼ変わらず、富が予期せず再分配されることはありません。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"予想外インフレ（Unanticipated Inflation）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：実際のインフレが予想から乖離し、貸し手と借り手の間で富が予期せず再分配されること。これこそが、インフレが真に「勝者と敗者」を生み出す根本原因です。\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"貸し手と借り手への影響メカニズム\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"固定金利での貸し借りを例にとります。今日、貸し手が$100を貸し出し、1年後に$110を回収する（名目金利10%）と約束したとします。この時、$100はちょうど1つの商品バスケットの価格に等しいとします。\"}]},{\"type\":\"table\",\"children\":[{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"インフレシナリオ\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"1年後のバスケット価格\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"$$110で買えるバスケット数\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"貸し手の実質リターン\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"インフレなし\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"$$100\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"1.1バスケット\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"+10%\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"穏やかなインフレ（2%）\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"$$102\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"約1.08バスケット\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"約+8%\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"極端なインフレ（120%）\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"$$220\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"0.5バスケット\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"-50%\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"極端なデフレ（45%）\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"$$55\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"2バスケット\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"+100%\"}]}]}]}],\"props\":{\"align\":[]}},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"規則：\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"予想外インフレ\",\"bold\":true},{\"type\":\"text\",\"text\":\" → 借り手が恩恵を受け、貸し手が損をする：借り手は購買力の低い貨幣で借金を返済するため、実質的な債務負担が減少する。貸し手は貸し出した時よりも購買力の低い貨幣を回収する。\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"予想外デフレ/インフレ減速\",\"bold\":true},{\"type\":\"text\",\"text\":\" → 貸し手が恩恵を受け、借り手が損をする：貸し手は予想よりも購買力の高い貨幣を回収する。借り手は購買力の高い貨幣で借金を返済しなければならず、実質的な金利負担が上昇する。\"}]}]}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"その他の影響を受けるグループ\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"損をする側：\",\"bold\":true}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"多額の現金を保有する者：現金の購買力はインフレとともに直接的に減少する。\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"固定名目所得者（固定年金受給者など）：実質購買力が継続的に侵食される。インフレが1-2%と穏やかに見えても、数十年の複利で累積すると影響は大きい。\"}]}]}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"恩恵を受ける側：\",\"bold\":true}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"実物資産保有者（不動産、金など）：資産価格は通常インフレとともに上昇し、実質的な富は比較的保全される。\"}]}]}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"投資への意味合い：\",\"bold\":true},{\"type\":\"text\",\"text\":\" インフレが上昇し、名目金利が不変の場合、実質金利は低下します。キャッシュフローを生み出さない金を保有する機会費用が低下し、魅力が増します。これこそが金と実質金利が負の相関関係にあるメカニズムの源泉です。\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"4.6 インフレの弊害と極端な状況\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"インフレの弊害\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"価格シグナルの曖昧化\"}]},{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"価格は市場経済において需給情報を伝えるシグナルです。高インフレ時には、価格変動のうちどれだけがインフレによるもので、どれだけが真の需給変化によるものか、区別が難しくなります。企業や消費者は価格シグナルを正確に読み取ることができず、資源配分の効率が低下し、市場が均衡に調整される速度も遅くなります。\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"長期計画の困難さ\"}]},{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"インフレは将来の不確実性を増大させます。退職計画、企業投資決定、長期借入契約など、将来の物価水準を予測する必要があります。インフレが高く、不安定であるほど、長期計画の難易度とリスクは大きくなります。企業は生産効率の向上ではなく、インフレリスクのヘッジに注力する可能性があります。\"}]}]}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"ディスインフレーション（Disinflation）\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"インフレ率が低下しているが、依然としてプラスの値であり、物価は上昇しているものの、その上昇ペースが緩やかになった状態です。政策立案者が「インフレを抑制する」と言う場合、目標はディスインフレーションであり、デフレーションではありません。\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"デフレーション\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"物価水準が絶対的に下降すること、すなわちインフレ率がマイナスになることです。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"デフレーションは表面上、物価下落が消費者にとって有利に見えますが、多くの場合、深刻な経済問題を伴います。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"消費者は「明日もっと安くなる」と予想する → 購入を先送りする → 企業収入が減少する → 人員削減 → 消費者がさらに減る → 物価がさらに下落する → スパイラルが強化される\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"デフレーションは金融政策も無効にします。名目金利は大幅なマイナスにできない一方で、デフレーションは実質金利を自動的に上昇させ、貸し出しと投資を抑制します。これが、ほとんどの政策立案者がデフレーションの回避をインフレ抑制よりも優先的な目標と見なす理由です。\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"ハイパーインフレーション（Hyperinflation）\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"ハイパーインフレーションは極端な高インフレであり、通常、政府による過度な紙幣増刷に関連しており、計画経済から市場経済への移行期や政府財政が完全に制御不能になった時に発生することが多いです。ハイパーインフレーション下では、貨幣はほとんど価値を失い、価格シグナルは完全に崩壊し、経済活動は麻痺し、社会の安定は深刻な脅威にさらされます。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"1923年のドイツと2000年代のジンバブエは教科書的な事例です。\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"スタグフレーション（Stagflation）\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"スタグフレーションは、インフレと経済停滞が同時に発生する異常な状態です。物価が上昇する一方で、経済成長が鈍化し、失業率が上昇します。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"典型的な引き金となるメカニズムは、供給サイドのショック（石油禁輸など）です。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"供給急減 → 物価上昇（インフレ）→ 生産コスト上昇 → 企業利益減少 → 人員削減 → 需要減少 → 経済停滞\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"スタグフレーションは中央銀行にとって最も対応が難しい状況です。利上げはインフレを抑制できますが、すでに低迷している経済をさらに圧迫します。利下げは経済を刺激できますが、インフレを悪化させます。2つの目標が互いに衝突するため、金融政策には両立する解決策がありません。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"1970年代の米国石油危機が最も典型的な歴史的事例です。\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"マクロフレームワークとの連携\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"ダリオのフレームワークでは、インフレは信用拡大の直接的な産物です。より多くの信用創造はより多くの総支出を意味し、物価水準を押し上げます。CPIはこのプロセスを測る最も直接的な指標です。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"実質金利（名目金利 - インフレ率）は、金、債券、為替レートなどの資産価格を理解するための核心的なツールです。これは本節の「名目vs実質変数」の実質的な意味でもあります。インフレデータ（CPI、コアインフレ、PPI）を継続的に監視し、各指標の意味を理解することは、中央銀行の政策動向を判断し、ひいては資産配分のタイミングを判断するための基礎能力です。\"}]},{\"type\":\"h2\",\"children\":[{\"type\":\"text\",\"text\":\"5. 名目GDPと実質GDP\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"5.1 なぜ名目と実質を区別する必要があるのか\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"GDPは貨幣で生産量を測定しますが、貨幣の購買力はインフレによって変化します。もし今年のGDPが$1,000から$1,200に増加し、増加率が20%だったとしても、これは生産量が実際に増加したためかもしれませんし、単に物価が上昇したためかもしれませんし、あるいはその両方かもしれません。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"リンゴだけを生産する単純化された経済を例にとります。\"}]},{\"type\":\"table\",\"children\":[{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"1年目\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"2年目\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"GDP\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"$$1,000\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"$$1,200\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"リンゴ単価\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"$$0.50/ポンド\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"$$0.55/ポンド\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"リンゴ生産量\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"2,000ポンド\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"2,182ポンド\"}]}]}]}],\"props\":{\"align\":[]}},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"名目GDPは20%増加しましたが、実際の生産量は約9%しか増加していません。名目と実質を区別しないと、経済の真の成長を過大評価することになります。\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"名目GDPと実質GDPの関係\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"基準年では、名目GDP = 実質GDP（デフレーター = 100であり、両者は完全に同じです）。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"基準年以降、インフレがあれば、名目GDPは物価上昇とともに増大し、実質GDPとの差が徐々に開きます。名目GDP曲線の傾きはより急に見えますが、この「成長」のかなりの部分は単なる物価上昇の幻想に過ぎません。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"⚠️ GDP成長率の数字を見る際には、まず名目か実質かを確認する必要があります。名目GDPの成長は、必ずしも生産量が実際に増加したことを意味しません。単にインフレが物価を押し上げただけかもしれません。実質GDPの成長だけが、真の生産量拡大を意味します。\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"5.2 定義\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"名目GDP（Nominal GDP）\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"当年の実際の価格\",\"bold\":true},{\"type\":\"text\",\"text\":\"で計算されたGDPで、「時価GDP」とも呼ばれます。その年の市場取引総額を反映しますが、価格変動の影響を含んでおり、生産量のみの変化を単独で反映することはできません。\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"実質GDP（Real GDP）\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"ある基準年の価格\",\"bold\":true},{\"type\":\"text\",\"text\":\"で計算されたGDPで、「不変価格GDP」とも呼ばれます。価格変動の影響を除去し、生産量の変化を真に反映するもので、経済の真の成長を測る指標です。\"}]},{\"type\":\"h4\",\"children\":[{\"type\":\"text\",\"text\":\"GDPデフレーター（GDP Deflator）\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"一国におけるすべての最終財およびサービスの平均物価水準を追跡する物価指数です。基準年のデフレーターは100と定義され、他の年のデフレーターは基準年に対する物価変化の程度を反映します。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"GDPデフレーターは、名目GDPと実質GDPの比率から導き出されます。\"}]},{\"type\":\"code_block\",\"value\":\"GDPデフレーター = (名目GDP ÷ 実質GDP) × 100\",\"children\":[{\"type\":\"code_line\",\"children\":[{\"text\":\"GDPデフレーター = (名目GDP ÷ 実質GDP) × 100\"}]}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"デフレーター \u003e 100：物価が基準年より高く、インフレが存在する\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"デフレーター \u003c 100：物価が基準年より低く、デフレが存在する\"}]}]}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"5.3 実質GDPの計算方法：基準年価格加重法\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"目標年の各商品の\"},{\"type\":\"text\",\"text\":\"生産量\",\"bold\":true},{\"type\":\"text\",\"text\":\"に\"},{\"type\":\"text\",\"text\":\"基準年の価格\",\"bold\":true},{\"type\":\"text\",\"text\":\"を乗じ、合計して実質GDPを算出します。これにより、価格変動を除去し、生産量の真の変化のみを反映することができます。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"計算手順：\",\"bold\":true}]},{\"type\":\"ol\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"基準年を決定し、基準年の各商品価格を記録する\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"目標年の各商品生産量を記録する\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"基準年価格 × 目標年生産量で合計する\"}]}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"上記のリンゴの例を続けます。2年目の生産量は2,182ポンドで、1年目の価格$0.50を使って計算します。\"}]},{\"type\":\"code_block\",\"value\":\"実質GDP（2年目、1年目の価格で）= 2,182 × $0.50 = $1,091\",\"children\":[{\"type\":\"code_line\",\"children\":[{\"text\":\"実質GDP（2年目、1年目の価格で）= 2,182 × $0.50 = $1,091\"}]}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"名目GDP（$1,200）と比較すると、実質成長は$91、つまり約9%に過ぎず、表面上の20%ではありません。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"限界：\",\"bold\":true},{\"type\":\"text\",\"text\":\" この方法は実質GDP成長を過大評価する可能性があります。ある商品の価格が時間とともに継続的に下落する場合（電子製品など）、かなり以前の高価格を基準として用いると、その商品のGDPへの貢献を誇張し、実質GDP成長が実際よりも高く見えることがあります。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"例：\",\"bold\":true}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"リンゴの価格が1年目の$0.50から3年目の$0.25に下落したが、生産量が2,000ポンドから2,200ポンドに増加したと仮定します。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"3年目の当年の価格で計算：2,200 × $0.25 = $550\\n1年目の基準価格で計算：2,200 × $0.50 = $1,100\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"同じ200ポンドの増産でも、基準年価格で計算された生産額は$1,100であり、当年価格で計算された$550の2倍です。実質GDP成長は明らかに過大評価されています。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"⚠️ 注意：ここで過大評価されているのは、生産物の\"},{\"type\":\"text\",\"text\":\"貨幣価値\",\"bold\":true},{\"type\":\"text\",\"text\":\"であり、生産量自体ではありません。生産量は客観的ですが、その価値をどのような価格で測るかによって、異なる結果が生じます。実際の運用では、統計機関は基準年を定期的に更新したり、より複雑な連鎖加重方式を使用したりして、このバイアスを軽減します。\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"マクロフレームワークとの連携\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"ダリオのフレームワークでは、名目値と実質値の区別が繰り返し強調されています。賃金は名目上は上昇しているが、実質購買力は減少している可能性がある。債務は名目値で計上されるが、真の返済圧力は実質値によって決まる。名目GDPと実質GDPの区別は、この原則がマクロ統計レベルで具体的に現れたものです。実質GDP成長は、一国の生産性が真に向上しているかを測る核心的な指標です。\"}]},{\"type\":\"h2\",\"children\":[{\"type\":\"text\",\"text\":\"6. 景気循環\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"実質GDPの時間的変化を図示すると、2つの重なり合ったトレンドを観察できます。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"長期トレンドライン\",\"bold\":true},{\"type\":\"text\",\"text\":\"：人口増加と生産性向上によって共同で推進され、実質GDPは長期的に安定して上昇します。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"短期変動\",\"bold\":true},{\"type\":\"text\",\"text\":\"：実質GDPは長期トレンドラインの周りを上下に変動し、時にはトレンドラインより高く、時にはトレンドラインより低くなります。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"このトレンドラインを中心とした短期的な変動が、**景気循環（Business Cycle）**です。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"「循環」という言葉にはある程度の誤解を招く可能性があります。それは正弦波のように規則的で予測可能なパターンではありません。景気循環の振幅、持続期間は非常に不規則であり、予測が困難です。隣接する2つのピークまたは谷間の時間間隔は固定されておらず、これこそが景気循環の予測が難しい根本的な理由です。\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"6.1 景気循環の4つの段階と2つの転換点\"}]},{\"type\":\"table\",\"children\":[{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"段階/転換点\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"定義\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"拡大（Expansion）\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"実質GDPが増加し、失業率が低下する\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"ピーク（Peak）\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"拡大が終わり、収縮が始まる転換点\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"景気後退（Recession）\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"実質GDPが減少し、失業率が上昇する\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"谷（Trough）\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"景気後退が終わり、回復が始まる転換点\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"回復（Recovery）\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"谷から始まり、GDPが再び上昇し、潜在生産水準に戻るまで\"}]}]}]}],\"props\":{\"align\":[]}},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"景気後退と恐慌（Depression）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：景気後退とは実質GDPが著しく低下することです。景気後退の程度が極めて深く、持続期間が極めて長い場合、恐慌と呼ばれます。1930年代の世界恐慌が最も典型的な事例です。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"米国では、景気循環の公式記録は私立研究機関である**全米経済研究所（NBER）**が担当しています。注目すべきは、深刻な景気後退の実際の影響は、NBERが公式に終了を宣言した後もかなりの期間続くことが多いという点です。\"}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"6.2 潜在生産量と生産量ギャップ\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"潜在生産量（Potential Output）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：経済がすべての資源を十分に効果的に利用したときに達成できる実質GDP水準で、「完全雇用生産量」とも呼ばれます。この時、失業率はちょうど自然失業率（NRU）に等しく、循環的失業はありません。景気循環図では、潜在生産量は長期成長トレンドラインに対応します。\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"生産量ギャップ（Output Gap）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：実際の生産量と潜在生産量との差。\"}]},{\"type\":\"ul\",\"children\":[{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"プラスの生産量ギャップ（Positive Output Gap）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：実際の生産量 \u003e 潜在生産量であり、景気循環曲線はトレンドラインの上方に位置します。この時、経済は「過熱」しており、失業率はNRUを下回り、企業は過剰に稼働し、資源は過度に使用されています。この状態は持続不可能であり、最終的にはピークに達した後、景気後退に入ります。\"}]}]},{\"type\":\"li\",\"children\":[{\"type\":\"lic\",\"children\":[{\"type\":\"text\",\"text\":\"マイナスの生産量ギャップ（Negative Output Gap）\",\"bold\":true},{\"type\":\"text\",\"text\":\"：実際の生産量 \u003c 潜在生産量であり、景気循環曲線はトレンドラインの下方に位置します。この時、失業率はNRUを上回り、経済はPPCの内側で稼働しており、資源の遊休が存在します。\"}]}]}]},{\"type\":\"h3\",\"children\":[{\"type\":\"text\",\"text\":\"6.3 PPCとの対応関係\"}]},{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"景気循環の各段階はPPCで視覚的に表現できます。\"}]},{\"type\":\"table\",\"children\":[{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"景気循環の位置\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"PPC対応位置\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"意味\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"実質生産量 = 潜在生産量\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"PPC上の点\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"完全雇用、資源の有効利用\"}]}]}]},{\"type\":\"tr\",\"children\":[{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"プラスの生産量ギャップ（ピーク付近）\"}]}]},{\"type\":\"td\",\"children\":[{\"type\":\"p\",\"children\":[{\"type\":\"text\",\"text\":\"PPC外側の点\"}]}]},{\"type\":\"td\",\"children\":[{\"
